  // Сравнение текущей статистики с утверждённой (с допуском)
  function wz3StatsMatchApproved(cur, app) {
    const eps = 0.005;  // допуск 0.5%
    const fields = ['q_total_mean','q_total_median','dp_mean','dp_median','p_tube_median','p_line_median'];
    for (const k of fields) {
      const a = cur[k], b = app[k];
      if (a === null && b === null) continue;
      if (a === null || b === null) return false;
      const denom = Math.max(Math.abs(a), Math.abs(b), 1e-6);
      if (Math.abs(a - b) / denom > eps) return false;
    }
    return true;
  }

  // Нейтральный комментарий о влиянии последнего изменения (без зелёных/красных дельт)
  function wz3RenderImpact(obs, prev) {
    const fields = [
      ['Q мед',  'flow_median',    'тыс.м³/сут'],
      ['Q ср',   'flow_avg',       'тыс.м³/сут'],
      ['ΔP мед', 'dp_median',      'кгс/см²'],
      ['КИВ',    'utilization_pct','%'],
    ];
    const parts = [];
    for (const [name, key, unit] of fields) {
      const cur = obs[key], p = prev[key];
      if (cur === null || cur === undefined || p === null || p === undefined) continue;
      const delta = cur - p;
      if (Math.abs(delta) < 0.001) continue;
      const pct = Math.abs(p) > 1e-6 ? (delta / Math.abs(p) * 100) : null;
      const pctTxt = pct !== null ? ` (${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%)` : '';
      parts.push(`${name}: ${delta >= 0 ? '+' : ''}${delta.toFixed(2)} ${unit}${pctTxt}`);
    }
    if (!parts.length) return '';
    return `
      <div style="background:#f5f5f5; border-left:3px solid #9e9e9e; padding:0.4rem 0.7rem; border-radius:4px; font-size:0.8rem; color:#555; margin-top:0.5rem;">
        ↺ <b>Изменение от прошлого расчёта:</b> ${parts.join(' · ')}
        <br><span style="color:#888; font-size:0.74rem;">
          Это разница «было vs стало» при последнем пересчёте — НЕ тренд внутри периода.
          Реальную динамику (направление вверх/вниз внутри окна) показывают карточки «Тренды за период» ниже.
        </span>
      </div>
    `;
  }

  function wz3RenderTrends(obs) {
    const trArr = [
      ['P трубное',  obs.p_tube_trend,  'кгс/см²'],
      ['P линейное', obs.p_line_trend,  'кгс/см²'],
      ['ΔP',         obs.dp_trend,      'кгс/см²'],
      ['Q дебит',    obs.q_trend,       'тыс.м³/сут'],
    ];
    let html = '<div class="wz-section"><h3>Тренды за период</h3>' +
      '<div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:0.6rem;">';
    for (const [name, tr, unit] of trArr) {
      if (!tr) {
        html += `<div class="wz-card wz-card-empty"><div class="wz-card-title">${name}</div><div class="wz-card-body">данных мало</div></div>`;
        continue;
      }
      const slope = tr.slope_per_day || 0;
      const r2 = tr.r_squared || 0;
      let icon = '→', color = '#666';
      if (tr.direction === 'up' && Math.abs(slope) > 0.01) { icon = '↑'; color = '#2e7d32'; }
      else if (tr.direction === 'down' && Math.abs(slope) > 0.01) { icon = '↓'; color = '#c62828'; }
      html += `<div class="wz-card">
        <div class="wz-card-title">${name}</div>
        <div class="wz-card-body" style="display:flex; align-items:center; gap:0.4rem;">
          <span style="font-size:1.6rem; color:${color};">${icon}</span>
          <div>
            <b>${fmt(slope, 3)}</b> <span style="color:#666; font-size:0.78rem;">${unit}/сут</span><br>
            <span style="color:#888; font-size:0.75rem;">R²=${fmt(r2, 2)}</span>
          </div>
        </div>
      </div>`;
    }
    html += '</div></div>';
    $('wz3-trends').innerHTML = html;
  }

  // Линейная регрессия: возвращает [start_y, end_y] по edge x — для отрисовки
  function wz3LinTrendLine(xs, ys) {
    const valid = [];
    for (let i = 0; i < xs.length; i++) {
      if (ys[i] !== null && ys[i] !== undefined && !isNaN(ys[i])) {
        valid.push([new Date(xs[i]).getTime() / 86400000, ys[i]]);
      }
    }
    if (valid.length < 3) return null;
    const xMin = valid[0][0], xMax = valid[valid.length - 1][0];
    const xs2 = valid.map(p => p[0] - xMin);
    const ys2 = valid.map(p => p[1]);
    const n = xs2.length;
    const sx = xs2.reduce((a, b) => a + b, 0);
    const sy = ys2.reduce((a, b) => a + b, 0);
    const sxy = xs2.reduce((a, _, i) => a + xs2[i] * ys2[i], 0);
    const sx2 = xs2.reduce((a, b) => a + b * b, 0);
    const slope = (n * sxy - sx * sy) / (n * sx2 - sx * sx);
    const intercept = (sy - slope * sx) / n;
    const slopePerDay = slope;  // already per day
    return {
      x: [xs[xs.findIndex(t => t === xs.find(t => new Date(t).getTime() / 86400000 === xMin))],
          xs[xs.length - 1]],
      y: [intercept, intercept + slope * (xMax - xMin)],
      slope_per_day: slopePerDay,
    };
  }

  // Стили для разных типов событий
  const WZ3_EVENT_STYLES = {
    purge:   {line: 'rgba(156,39,176,0.65)', dash: 'dash',  width: 2,   label: '🌀'},
    reagent: {line: 'rgba(46,125,50,0.7)',   dash: 'dot',   width: 1.5, label: '💧'},
    equip:   {line: 'rgba(2,136,209,0.55)',  dash: 'dot',   width: 1,   label: '🔧'},
    other:   {line: 'rgba(117,117,117,0.45)',dash: 'solid', width: 0.8, label: '·'},
  };

  // shapes: события из БД (вертикальные линии всех типов) + ручные аннотации (заливка)
  function wz3BuildShapes(annotations, eventMarkers) {
    const shapes = [];
    // События из БД — вертикальные линии разных стилей
    for (const ev of (eventMarkers || [])) {
      const st = WZ3_EVENT_STYLES[ev.type] || WZ3_EVENT_STYLES.other;
      shapes.push({
        type: 'line', xref: 'x', yref: 'paper',
        x0: ev.t, x1: ev.t, y0: 0, y1: 1,
        line: {color: st.line, width: st.width, dash: st.dash},
      });
    }
    // Ручные аннотации — закрашенные прямоугольники
    for (const a of annotations) {
      const color = a.kind === 'purge'    ? 'rgba(156,39,176,0.22)'
                 : a.kind === 'downtime' ? 'rgba(220,38,38,0.22)'
                 : 'rgba(102,102,102,0.20)';
      const border = a.kind === 'purge'    ? 'rgba(156,39,176,0.7)'
                  : a.kind === 'downtime' ? 'rgba(220,38,38,0.7)'
                  : 'rgba(102,102,102,0.5)';
      shapes.push({
        type: 'rect', xref: 'x', yref: 'paper',
        x0: a.from, x1: a.to, y0: 0, y1: 1,
        fillcolor: color, line: {color: border, width: 1},
      });
    }
    return shapes;
  }

    const opts = [

  // Plotly annotations (значки сверху) для всех типов событий из БД
  function wz3BuildEventAnnotations(eventMarkers) {
    const out = [];
    for (const ev of (eventMarkers || [])) {
      const st = WZ3_EVENT_STYLES[ev.type] || WZ3_EVENT_STYLES.other;
      out.push({
        x: ev.t, y: 1.02, xref: 'x', yref: 'paper',
        text: st.label, showarrow: false,
        font: {size: 12, color: st.line},
        bgcolor: 'rgba(255,255,255,0.7)',
      });
    }
    return out;
  }

  function wz3RenderCharts(obs) {
    if (!obs.chart_data || !obs.chart_data.length) {
      $('wz3-charts-block').style.display = 'none';
      return;
    }
    $('wz3-charts-block').style.display = '';

    // Вставим toggles перед графиками (один раз)
    wz3RenderToggles();

    const d = state.steps[3].data;
    if (!d.viz) d.viz = {p_tube: true, p_line: true, dp: true, q: true,
                         show_mean: true, show_median: true, show_fill: true,
                         show_downtime: true, show_trend: true};
    const v = d.viz;
    const cd = obs.chart_data;
    const annotations = d.annotations || [];
    const events = obs.events_for_chart || [];

    // Фильтруем точки (исключаем те, что в exclude/purge/downtime)
    const isExcluded = (t) => {
      const ts = new Date(t).getTime();
      return annotations.some(a => {
        const a1 = new Date(a.from).getTime(), a2 = new Date(a.to).getTime();
        return ts >= a1 && ts <= a2;
      });
    };

    const dates = cd.map(c => c.t);
    const pt = cd.map(c => isExcluded(c.t) ? null : c.p_tube);
    const pl = cd.map(c => isExcluded(c.t) ? null : c.p_line);
    const dp = cd.map(c => isExcluded(c.t) ? null : c.dp);
    const q  = cd.map(c => isExcluded(c.t) ? null : c.q);

    // Простой = час с ΔP <= 0.1 (или null) → находим непрерывные интервалы
    const downtimeRanges = [];
    let curStart = null;
    for (const c of cd) {
      const isDown = (c.p_tube === null || c.p_line === null
                      || (c.dp !== null && c.dp <= 0.1));
      if (isDown && curStart === null) curStart = c.t;
      else if (!isDown && curStart !== null) {
        downtimeRanges.push([curStart, c.t]);
        curStart = null;
      }
    }
    if (curStart !== null) downtimeRanges.push([curStart, cd[cd.length - 1].t]);

    // Доп shapes для простоев (если включено)
    const dtShapes = v.show_downtime ? downtimeRanges.map(([from, to]) => ({
      type: 'rect', xref: 'x', yref: 'paper',
      x0: from, x1: to, y0: 0, y1: 1,
      fillcolor: 'rgba(220,38,38,0.10)', line: {width: 0},
    })) : [];

    const shapes = wz3BuildShapes(annotations, events).concat(dtShapes);
    const evAnn = wz3BuildEventAnnotations(events);

    // Helpers: mean / median по фильтрованным
    const arrValid = arr => arr.filter(x => x !== null && !isNaN(x));
    const meanA = arr => { const v = arrValid(arr); return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null; };
    const medA = arr => {
      const v = arrValid(arr).slice().sort((a,b)=>a-b);
      if (!v.length) return null; const n = v.length;
      return n % 2 ? v[(n-1)/2] : (v[n/2-1] + v[n/2]) / 2;
    };
    const dpMean = meanA(dp), dpMed = medA(dp);
    const qMean  = meanA(q),  qMed  = medA(q);

    // Тренды по фильтрованным
    const trDp = wz3LinTrendLine(dates, dp);
    const trQ  = wz3LinTrendLine(dates, q);

    // helper: горизонтальные shape-линии для mean/median + fill между ними
    const buildHLines = (mean, median, colorMean, colorMed) => {
      const arr = [];
      const min = Math.min(mean, median), max = Math.max(mean, median);
      if (v.show_fill && mean !== null && median !== null && Math.abs(mean - median) > 1e-6) {
        arr.push({
          type: 'rect', xref: 'paper', yref: 'y',
          x0: 0, x1: 1, y0: min, y1: max,
          fillcolor: 'rgba(255,193,7,0.12)', line: {width: 0},
        });
      }
      if (v.show_mean && mean !== null) {
        arr.push({
          type: 'line', xref: 'paper', yref: 'y',
          x0: 0, x1: 1, y0: mean, y1: mean,
          line: {color: colorMean, width: 1.5, dash: 'dot'},
        });
      }
      if (v.show_median && median !== null) {
        arr.push({
          type: 'line', xref: 'paper', yref: 'y',
          x0: 0, x1: 1, y0: median, y1: median,
          line: {color: colorMed, width: 1.5, dash: 'dashdot'},
        });
      }
      return arr;
    };

    // ─── 1) Давления + события
    const presTraces = [];
    if (v.p_tube) presTraces.push(
      {x: dates, y: pt, name: 'P трубное', mode: 'lines',
       line: {color: '#1f77b4', width: 1.4}, connectgaps: false});
    if (v.p_line) presTraces.push(
      {x: dates, y: pl, name: 'P линейное', mode: 'lines',
       line: {color: '#d62728', width: 1.4}, connectgaps: false});
    Plotly.newPlot('wz3-ch-pres', presTraces,
      {...WZ2_PLOTLY_LAYOUT, title: 'Давления (наши датчики)',
       yaxis:{title:'кгс/см²'}, shapes, annotations: evAnn,
       dragmode: 'select', selectdirection: 'h'},
      {...WZ2_PLOTLY_CONFIG, modeBarButtonsToAdd: ['select2d']});
    wz3WirePlotlySelect('wz3-ch-pres');

    // ─── 2) ΔP + тренд + mean/median + fill + downtime
    const dpTraces = [];
    if (v.dp) dpTraces.push(
      {x: dates, y: dp, name: 'ΔP', mode: 'lines',
       line: {color: '#ef6c00', width: 1.6}, fill:'tozeroy',
       fillcolor:'rgba(239,108,0,0.1)', connectgaps: false});
    if (v.show_trend && trDp) {
      dpTraces.push({
        x: trDp.x, y: trDp.y,
        name: `Тренд ${(trDp.slope_per_day || 0) >= 0 ? '↑' : '↓'} ${(trDp.slope_per_day || 0).toFixed(3)}/сут`,
        mode: 'lines', line: {color: '#000', width: 1.5, dash: 'dash'},
      });
    }
    // Mean/median legend traces (точки вне видимой зоны)
    if (v.show_mean && dpMean !== null) dpTraces.push({
      x: [dates[0]], y: [dpMean], name: `Среднее ΔP=${fmt(dpMean)}`,
      mode: 'markers', marker: {color: '#0d47a1', size: 8, symbol: 'line-ew', line: {width: 2, dash: 'dot'}},
      showlegend: true,
    });
    if (v.show_median && dpMed !== null) dpTraces.push({
      x: [dates[0]], y: [dpMed], name: `Медиана ΔP=${fmt(dpMed)}`,
      mode: 'markers', marker: {color: '#1565c0', size: 8, symbol: 'line-ew', line: {width: 2, dash: 'dashdot'}},
      showlegend: true,
    });

    const dpShapes = shapes.concat(buildHLines(dpMean, dpMed, '#0d47a1', '#1565c0'));
    Plotly.newPlot('wz3-ch-dp', dpTraces,
      {...WZ2_PLOTLY_LAYOUT, title: 'Перепад ΔP — тренд, среднее, медиана',
       yaxis:{title:'кгс/см²'}, shapes: dpShapes, annotations: evAnn,
       dragmode: 'select', selectdirection: 'h'},
      {...WZ2_PLOTLY_CONFIG, modeBarButtonsToAdd: ['select2d']});
    wz3WirePlotlySelect('wz3-ch-dp');

    // ─── 3) Q + тренд + mean/median + fill + downtime
    const qTraces = [];
    if (v.q) qTraces.push(
      {x: dates, y: q, name: 'Q', mode: 'lines',
       line: {color: '#2e7d32', width: 1.6}, connectgaps: false});
    if (v.show_trend && trQ) {
      qTraces.push({
        x: trQ.x, y: trQ.y,
        name: `Тренд ${(trQ.slope_per_day || 0) >= 0 ? '↑' : '↓'} ${(trQ.slope_per_day || 0).toFixed(3)}/сут`,
        mode: 'lines', line: {color: '#000', width: 1.5, dash: 'dash'},
      });
    }
    if (v.show_mean && qMean !== null) qTraces.push({
      x: [dates[0]], y: [qMean], name: `Среднее Q=${fmt(qMean)}`,
      mode: 'markers', marker: {color: '#0d47a1', size: 8, symbol: 'line-ew', line: {width: 2, dash: 'dot'}},
      showlegend: true,
    });
    if (v.show_median && qMed !== null) qTraces.push({
      x: [dates[0]], y: [qMed], name: `Медиана Q=${fmt(qMed)}`,
      mode: 'markers', marker: {color: '#1565c0', size: 8, symbol: 'line-ew', line: {width: 2, dash: 'dashdot'}},
      showlegend: true,
    });
    const qShapes = shapes.concat(buildHLines(qMean, qMed, '#0d47a1', '#1565c0'));
    Plotly.newPlot('wz3-ch-flow', qTraces,
      {...WZ2_PLOTLY_LAYOUT, title: 'Дебит Q(t) — тренд, среднее, медиана',
       yaxis:{title:'тыс.м³/сут'}, shapes: qShapes, annotations: evAnn,
       dragmode: 'select', selectdirection: 'h'},
      {...WZ2_PLOTLY_CONFIG, modeBarButtonsToAdd: ['select2d']});
    wz3WirePlotlySelect('wz3-ch-flow');

    // ─── 4) Учёт рабочего времени по дням
    const byDay = {};
    for (const c of cd) {
      const day = c.t.slice(0, 10);
      if (!byDay[day]) byDay[day] = {total: 0, down: 0};
      byDay[day].total += 1;
      const ex = isExcluded(c.t);
      const isDown = ex || (c.p_tube === null || c.p_line === null || (c.dp !== null && c.dp <= 0.1));
      if (isDown) byDay[day].down += 1;
    }
    const dayLabels = Object.keys(byDay).sort();
    const downHours = dayLabels.map(d => byDay[d].down);
    const workHours = dayLabels.map(d => byDay[d].total - byDay[d].down);

    // Подсчёт событий по дням (для подписей сверху столбцов)
    const evCountByDay = {};
    for (const ev of events) {
      const day = ev.t.slice(0, 10);
      if (!evCountByDay[day]) evCountByDay[day] = {};
      evCountByDay[day][ev.type] = (evCountByDay[day][ev.type] || 0) + 1;
    }
    const dayEvAnn = [];
    for (const day of dayLabels) {
      const counts = evCountByDay[day];
      if (!counts) continue;
      const labels = Object.entries(counts).map(([t, n]) =>
        `${(WZ3_EVENT_STYLES[t] || WZ3_EVENT_STYLES.other).label}${n}`
      ).join(' ');
      dayEvAnn.push({
        x: day, y: 1.04, xref: 'x', yref: 'paper',
        text: labels, showarrow: false,
        font: {size: 10}, bgcolor: 'rgba(255,255,255,0.7)',
      });
    }

    Plotly.newPlot('wz3-ch-down', [
      {x: dayLabels, y: workHours, name: 'Рабочих ч/сут', type:'bar', marker:{color:'#16a34a'}},
      {x: dayLabels, y: downHours, name: 'Простой ч/сут', type:'bar', marker:{color:'#dc2626'}},
    ], {...WZ2_PLOTLY_LAYOUT, title: 'Учёт рабочего времени по дням',
        yaxis:{title:'часов'}, barmode:'stack', annotations: dayEvAnn}, WZ2_PLOTLY_CONFIG);

    // Список аннотаций
    wz3RenderAnnotationsList();
    // Обновлённая статистика (с учётом исключений)
    wz3RenderRecomputedStats(obs);
  }

  window.wz3DeleteAnnotation = function(id) {
    const d = state.steps[3].data;

  // Пересчёт статистики с учётом исключённых интервалов
  function wz3RenderRecomputedStats(obs) {
    const d = state.steps[3].data;
    const ann = d.annotations || [];
    if (!ann.length) {
      // Нет исключений — показываем оригинал
      wz3RenderBaselineCard(obs, d.previousBaseline);
      return;
    }
    const cd = obs.chart_data || [];
    const isExcluded = (t) => {
      const ts = new Date(t).getTime();
      return ann.some(a => {
        const a1 = new Date(a.from).getTime(), a2 = new Date(a.to).getTime();
        return ts >= a1 && ts <= a2;
      });
    };
    const filtered = cd.filter(c => !isExcluded(c.t));
    const validQ = filtered.map(c => c.q).filter(v => v !== null && v !== undefined);
    const validDp = filtered.map(c => c.dp).filter(v => v !== null && v !== undefined);
    const validPt = filtered.map(c => c.p_tube).filter(v => v !== null && v !== undefined);
    const validPl = filtered.map(c => c.p_line).filter(v => v !== null && v !== undefined);

    const median = (arr) => {
      if (!arr.length) return null;
      const s = [...arr].sort((a, b) => a - b); const n = s.length;
      return n % 2 ? s[(n-1)/2] : (s[n/2-1] + s[n/2]) / 2;
    };
    const mean = (arr) => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null;

    // Подсчёт продувок (manual purges + events purges, не дублируя)
    const manualPurges = ann.filter(a => a.kind === 'purge').length;
    const manualDowntime = ann.filter(a => a.kind === 'downtime').length;
    const eventsPurges = (obs.events_for_chart || []).filter(e => e.type === 'purge').length;

    const recomputed = {
      ...obs,
      flow_median:    median(validQ),
      flow_avg:       mean(validQ),
      dp_median:      median(validDp),
      p_tube_median:  median(validPt),
      p_line_median:  median(validPl),
      hours_with_data: filtered.length,
      working_hours:   validQ.length,  // приближённо: где есть Q > 0 неявно
      purge_count:     eventsPurges + manualPurges,
      downtime_hours:  (cd.length - filtered.length) + (obs.downtime_hours || 0),
    };

    wz3RenderBaselineCard(recomputed, d.previousBaseline);

    // Сообщение об исключениях
    const block = $('wz3-baseline-card');
    if (block) {
      const note = document.createElement('div');
      note.style.cssText = 'background:#fffbf0; border-left:3px solid #ff9800; padding:0.4rem 0.7rem; border-radius:4px; font-size:0.82rem; margin-top:0.5rem;';
      const exH = cd.length - filtered.length;
      note.innerHTML = `⚠ Исключено <b>${exH}</b> часов из ${cd.length} (${(exH / cd.length * 100).toFixed(1)}%) согласно вашим аннотациям. Цифры выше — пересчитаны без них.`;
      block.querySelector('.wz-section').appendChild(note);
    }
  }

  // Автогенерация текста описания на основе текущей статистики и аннотаций
  function wz3GenerateDescription() {
    const d = state.steps[3].data;
    const obs = d.lastResult && d.lastResult.observation;
    if (!obs) return '';
    const ann = d.annotations || [];
    const events = (obs.events_for_chart || []).filter(e => e.type === 'purge');
    const manualPurges = ann.filter(a => a.kind === 'purge').length;
    const manualDowntime = ann.filter(a => a.kind === 'downtime').length;
    const manualExclude = ann.filter(a => a.kind === 'exclude').length;

    const parts = [];
    parts.push(`Этап наблюдения по нашим датчикам с ${fmtDt(d.from)} по ${fmtDt(d.to)} (${obs.duration_label || obs.duration_days + ' сут.'}).`);

    parts.push(`Базовые параметры: Q медиана ${fmt(obs.flow_median)} тыс.м³/сут, ΔP медиана ${fmt(obs.dp_median)} кгс/см², КИВ ${fmt(obs.utilization_pct, 1)}%, рабочих часов ${obs.working_hours} из ${obs.hours_with_data}.`);

    // Тренды
    const trArr = [
      ['Q', obs.q_trend, 'тыс.м³/сут'],
      ['ΔP', obs.dp_trend, 'кгс/см²'],
    ];
    const trWords = [];
    for (const [name, tr, unit] of trArr) {
      if (!tr) continue;
      const slope = tr.slope_per_day || 0;
      if (Math.abs(slope) < 0.01) continue;
      const word = tr.direction === 'up' ? 'рост' : tr.direction === 'down' ? 'снижение' : 'стабильно';
      trWords.push(`${name}: ${word} ${slope >= 0 ? '+' : ''}${slope.toFixed(3)} ${unit}/сут`);
    }
    if (trWords.length) {
      parts.push(`Динамика: ${trWords.join('; ')}.`);
    } else {
      parts.push('Параметры за период менялись незначительно — режим стабильный.');
    }

    // Продувки и аннотации
    const allPurges = events.length + manualPurges;
    if (allPurges > 0) {
      parts.push(`Зафиксировано ${allPurges} продувок (${events.length} из журнала событий, ${manualPurges} ручных).`);
    }
    if (manualDowntime > 0) {
      parts.push(`Ручных меток простоя: ${manualDowntime}.`);
    }
    if (manualExclude > 0) {
      parts.push(`Из расчёта исключено ${manualExclude} интервалов выбросов/шума.`);
    }
    return parts.join(' ');
  }

  function wz3RenderSaveBaseline() {
    const box = $('wz3-save-baseline');
    box.style.display = '';
    const obs = state.steps[3].data.lastResult ? state.steps[3].data.lastResult.observation : null;
    if (!obs) { box.innerHTML = ''; return; }

    // Регенерируем описание если ещё не было задано (или если поле пустое)
    const d = state.steps[3].data;
    const autoDesc = wz3GenerateDescription();
    if (!d.description || d.description === d._lastAutoDesc) {
      d.description = autoDesc;
      d._lastAutoDesc = autoDesc;
      const ta = $('wz3-desc');
      if (ta) ta.value = autoDesc;
    }

    if (!custIsAdmin) {
      box.innerHTML = '<div class="wz-warn">«Утвердить» доступно только администратору.</div>';
      return;
    }
    box.innerHTML = `
      <div class="wz-section" style="background:#e8f5e9; padding:1rem; border-radius:6px; border:1px solid #4caf50;">
        <h3 style="margin:0 0 0.4rem;">📌 Утвердить базовые параметры B2</h3>
        <div style="font-size:0.85rem; color:#444; margin-bottom:0.5rem;">
          Запишет текущие значения как <b>baseline B2 (источник «observation»)</b>:
          <br>Q мед = <b>${fmt(obs.flow_median)}</b> · Q ср = <b>${fmt(obs.flow_avg)}</b>
          · ΔP мед = <b>${fmt(obs.dp_median)}</b> · КИВ = <b>${fmt(obs.utilization_pct, 1)}%</b>
          · Продувок = <b>${(state.steps[3].data.annotations || []).filter(a=>a.kind==='purge').length + (obs.events_for_chart || []).filter(e=>e.type==='purge').length}</b>
          · Длит. = <b>${obs.duration_label || obs.duration_days + ' сут.'}</b>
        </div>
        <button id="wz3-save-bl-btn" class="wz-btn wz-btn-success">✓ Утвердить и сохранить</button>
      </div>
    `;
    $('wz3-save-bl-btn').addEventListener('click', wz3SaveBaseline);
  }

  async function wz3SaveBaseline() {
    const d = state.steps[3].data;
    const obs = d.lastResult ? d.lastResult.observation : null;
    if (!obs) { alert('Нет данных анализа.'); return; }

    // Используем тот же расчёт что и для карточки — гарантия совпадения
    const s = wz3ComputeBaselineStats(obs);

    // Маппим в формат customer_baseline (q_total_avg/q_working_avg, p_wellhead_*, p_flowline_*)
    const stats = {
      days_count: s.duration_days,
      q_total_avg: s.q_total_mean,
      q_total_median: s.q_total_median,
      q_working_avg: s.q_working_mean,
      q_working_median: s.q_working_median,
      p_wellhead_avg: s.p_tube_mean,
      p_wellhead_median: s.p_tube_median,
      p_flowline_avg: s.p_line_mean,
      p_flowline_median: s.p_line_median,
      dp_avg: s.dp_mean,
      dp_median: s.dp_median,
      shutdown_min_total: s.downtime_hours * 60,
      shutdown_min_avg: null,
      shutdown_days_count: null,
    };

    const defaultName = `B2 Наблюдение ${d.from.slice(0, 10)} — ${d.to.slice(0, 10)}`;
    const name = prompt('Название baseline B2:', defaultName);
    if (!name) return;
    const notes = prompt('Заметки (опционально):') || '';
    const fromDate = d.from.slice(0, 10);
    const toDate = d.to.slice(0, 10);

    const r = await fetch('/api/adaptation-report/baselines', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        well_id: state.well.id,
        name, source: 'observation',
        period_from: fromDate, period_to: toDate,
        notes, precomputed_stats: stats,
      }),
    });
    const res = await r.json();
    if (res.ok) {
      // Сохраняем утверждённый baseline в state — для отображения статуса и сравнений
      d.approvedStats = {
        ...s,
        id: res.baseline.id,
        savedAt: new Date().toISOString(),
        baseline: res.baseline,
      };
      // Перерисуем карточку — теперь покажет «✓ утверждён»
      wz3RenderBaselineCard(obs, d.previousBaseline);
      wz3RenderSaveBaseline();
      alert(`✓ Baseline B2 утверждён и сохранён в БД.

Q мед=${fmt(s.q_total_median)} · Q ср=${fmt(s.q_total_mean)}
ΔP мед=${fmt(s.dp_median)} · ΔP ср=${fmt(s.dp_mean)}
P тр мед=${fmt(s.p_tube_median)} · P лин мед=${fmt(s.p_line_median)}
Продувок: ${s.purge_count_total} · простой: ${s.downtime_hours} ч · КИВ: ${fmt(s.utilization_pct, 1)}%

Эти значения используются в шагах 4 (валидация) и 6 (сравнение). На графиках они НЕ изменятся.`);
    } else {
      alert(res.detail || 'Ошибка сохранения');
    }
  }

  // Загрузить существующий baseline B2 при заходе на шаг 3
  async function wz3LoadExistingBaseline() {
    if (!state.well || !state.well.id) return;
    try {
      const r = await fetch(`/api/adaptation-report/baselines?well_id=${state.well.id}`);
      const data = await r.json();
      const baselines = data.baselines || [];
      // Берём последний baseline источника 'observation'
      const obsBaselines = baselines.filter(b => b.source === 'observation');
      if (obsBaselines.length > 0) {
        const latest = obsBaselines[0];  // отсортированы по pinned/created_at desc
        // Маппим обратно в формат _currentStats
        state.steps[3].data.approvedStats = {
          q_total_mean: latest.q_total_avg,
          q_total_median: latest.q_total_median,
          q_working_mean: latest.q_working_avg,
          q_working_median: latest.q_working_median,
          p_tube_mean: latest.p_wellhead_avg,
          p_tube_median: latest.p_wellhead_median,
          p_line_mean: latest.p_flowline_avg,
          p_line_median: latest.p_flowline_median,
          dp_mean: latest.dp_avg,
          dp_median: latest.dp_median,
          downtime_hours: Math.round((latest.shutdown_min_total || 0) / 60),
          id: latest.id,
          savedAt: latest.created_at,
          baseline: latest,
        };
      }
    } catch (e) {}
  }
  // ═══ STEP 4: Кросс-валидация ═══

  // ─── Часть 1: B2 vs Заказчик на пересечении ───
  async function wz4RenderOverlapSection() {
    const box = $('wz4-section-overlap');
    const obs = state.steps[3].data.lastResult ? state.steps[3].data.lastResult.observation : null;
    if (!obs || !obs.chart_data) {
      box.innerHTML = `<div class="wz-warn">Сначала пройдите шаг 3 (Этап наблюдения) — без B2 данных нечего сравнивать.</div>`;
      return;
    }
    const wn = state.well.number;
    const dFrom = obs.chart_data[0].t.slice(0, 10);
    const dTo = obs.chart_data[obs.chart_data.length - 1].t.slice(0, 10);

    box.innerHTML = `<div class="wz-section">
      <h3>Часть 1. Наложение на период этапа наблюдения (B2)</h3>
      <div style="font-size:0.82rem; color:#666; margin-bottom:0.4rem;">
        Период этапа B2: <b>${dFrom}</b> → <b>${dTo}</b>. Сравниваем с данными заказчика на этот же диапазон.
      </div>
      <div id="wz4-overlap-status"></div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.6rem;">
        <div id="wz4-overlap-q" style="height:280px;"></div>
        <div id="wz4-overlap-dp" style="height:280px;"></div>
      </div>
      <div id="wz4-overlap-stats" style="margin-top:0.6rem;"></div>
      <div id="wz4-overlap-table" style="margin-top:0.8rem;"></div>
    </div>`;

    let custData = null;
    try {
      const r = await fetch(`/api/customer-daily/well/${encodeURIComponent(wn)}?date_from=${dFrom}&date_to=${dTo}`);
      custData = await r.json();
    } catch (e) {}

    const b2Dates = obs.chart_data.map(c => c.t);
    const b2Q = obs.chart_data.map(c => c.q);
    const b2Dp = obs.chart_data.map(c => c.dp);

    const qTraces = [{x: b2Dates, y: b2Q, name:'B2 Q (наши, час)', mode:'lines', line:{color:'#16a34a',width:1.5}}];
    const dpTraces = [{x: b2Dates, y: b2Dp, name:'B2 ΔP (наши, час)', mode:'lines', line:{color:'#ef6c00',width:1.5}}];

    if (custData && custData.ok && custData.rows > 0 && custData.chart) {
      const cd = custData.chart;
      qTraces.push({x: cd.dates, y: cd.q_gas_working, name:'Заказчик Q раб (день)', mode:'lines+markers', line:{color:'#1d4ed8',width:1.5,dash:'dot'}, marker:{size:6}});
      qTraces.push({x: cd.dates, y: cd.q_gas_total, name:'Заказчик Q общ (день)', mode:'lines+markers', line:{color:'#7c3aed',width:1.5,dash:'dot'}, marker:{size:6}});
      dpTraces.push({x: cd.dates, y: cd.dp, name:'Заказчик ΔP (день)', mode:'lines+markers', line:{color:'#dc2626',width:1.5,dash:'dot'}, marker:{size:6}});

      // Подробная посуточная таблица сравнения
      wz4RenderDailyComparisonTable(obs.chart_data, cd);

      // Сводная стат
      const meanQ = arr => { const v = arr.filter(x => x !== null && !isNaN(x)); return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null; };
      const b2QMean = meanQ(b2Q);
      const cuQMean = meanQ(cd.q_gas_working);
      const b2DpMean = meanQ(b2Dp);
      const cuDpMean = meanQ(cd.dp);
      const dQ = (b2QMean !== null && cuQMean !== null) ? (b2QMean - cuQMean) : null;
      const dDp = (b2DpMean !== null && cuDpMean !== null) ? (b2DpMean - cuDpMean) : null;

      const fmtDelta = (v, base) => v === null ? '—'
        : `${v >= 0 ? '+' : ''}${v.toFixed(2)} (${base ? (v / Math.abs(base) * 100).toFixed(1) + '%' : '—'})`;

      $('wz4-overlap-stats').innerHTML = `
        <div class="wz-preview-card">
          <span class="wz-preview-stat">B2 Q ср: <b>${fmt(b2QMean)}</b></span>
          <span class="wz-preview-stat">Заказчик Q ср: <b>${fmt(cuQMean)}</b></span>
          <span class="wz-preview-stat">Δ Q: <b>${fmtDelta(dQ, cuQMean)}</b></span>
          <span class="wz-preview-stat">B2 ΔP ср: <b>${fmt(b2DpMean)}</b></span>
          <span class="wz-preview-stat">Заказчик ΔP ср: <b>${fmt(cuDpMean)}</b></span>
          <span class="wz-preview-stat">Δ ΔP: <b>${fmtDelta(dDp, cuDpMean)}</b></span>
        </div>
        <div class="wz-info" style="margin-top:0.4rem;">
          ${dQ !== null && cuQMean && Math.abs(dQ / cuQMean * 100) < 10
            ? '✓ Расхождение менее 10% — данные согласуются.'
            : '⚠ Существенное расхождение между источниками.'}
        </div>
      `;
      $('wz4-overlap-status').innerHTML = `<div class="wz-info">✓ Найдено ${cd.dates.length} дней данных заказчика в этом периоде. Подробное сравнение ниже.</div>`;
    } else {
      $('wz4-overlap-status').innerHTML = `<div class="wz-warn">⚠ За период наблюдения нет данных заказчика в well_daily. Используйте Часть 2 ниже — выберите отдельный базовый период.</div>`;
      $('wz4-overlap-stats').innerHTML = '';
      $('wz4-overlap-table').innerHTML = '';
    }

    Plotly.newPlot('wz4-overlap-q', qTraces,
      {...WZ2_PLOTLY_LAYOUT, title:'Q: наши (час) ↔ заказчик (день)', yaxis:{title:'тыс.м³/сут'}}, WZ2_PLOTLY_CONFIG);
    Plotly.newPlot('wz4-overlap-dp', dpTraces,
      {...WZ2_PLOTLY_LAYOUT, title:'ΔP: наши (час) ↔ заказчик (день)', yaxis:{title:'кгс/см²'}}, WZ2_PLOTLY_CONFIG);
  }

  // Посуточная таблица: B2 (агрегировано до дня) vs Заказчик
  function wz4RenderDailyComparisonTable(b2hourly, custChart) {
    // Агрегируем B2 по дням
    const byDay = {};
    for (const c of b2hourly) {
      const day = c.t.slice(0, 10);
      if (!byDay[day]) byDay[day] = {q: [], dp: [], pt: [], pl: []};
      if (c.q  !== null && !isNaN(c.q))  byDay[day].q.push(c.q);
      if (c.dp !== null && !isNaN(c.dp)) byDay[day].dp.push(c.dp);
      if (c.p_tube !== null) byDay[day].pt.push(c.p_tube);
      if (c.p_line !== null) byDay[day].pl.push(c.p_line);
    }
    const agg = (arr, fn) => arr.length ? fn(arr) : null;
    const mean = arr => arr.reduce((a,b)=>a+b,0) / arr.length;

    // Customer dictionary by date
    const cust = {};
    for (let i = 0; i < custChart.dates.length; i++) {
      cust[custChart.dates[i]] = {
        q_total: custChart.q_gas_total[i],
        q_work: custChart.q_gas_working[i],
        p_well: custChart.p_wellhead[i],
        p_line: custChart.p_flowline[i],
        dp: custChart.dp[i],
        sd: custChart.shutdown_min[i],
      };
    }

    const allDays = [...new Set([...Object.keys(byDay), ...Object.keys(cust)])].sort();

    let html = '<h4 style="margin:0 0 0.4rem;">Посуточное сравнение (B2 → агрегация по дням ↔ Заказчик)</h4>';
    html += `<div style="font-size:0.78rem; color:#666; margin-bottom:0.3rem;">
      Сравниваем эквивалентные суточные значения. B2-часовые данные агрегированы как среднее за сутки.
    </div>`;
    html += '<table class="wz-table"><thead><tr>' +
      '<th>День</th>' +
      '<th colspan="2" style="text-align:center;">Q раб</th>' +
      '<th>Δ</th>' +
      '<th colspan="2" style="text-align:center;">ΔP</th>' +
      '<th>Δ</th>' +
      '<th>Простой</th>' +
      '</tr><tr style="font-size:0.72rem; color:#888;">' +
      '<th></th>' +
      '<th>B2 (день)</th><th>Заказчик</th><th></th>' +
      '<th>B2 (день)</th><th>Заказчик</th><th></th>' +
      '<th>заказчик, мин</th>' +
      '</tr></thead><tbody>';
    for (const d of allDays) {
      const b = byDay[d];
      const c = cust[d];
      const b2Q = b ? agg(b.q, mean) : null;
      const cuQ = c ? c.q_work : null;
      const dQ = (b2Q !== null && cuQ !== null) ? b2Q - cuQ : null;
      const b2Dp = b ? agg(b.dp, mean) : null;
      const cuDp = c ? c.dp : null;
      const dDp = (b2Dp !== null && cuDp !== null) ? b2Dp - cuDp : null;
      const dCls = dQ === null ? '' : (Math.abs(dQ) < 0.01 ? '' : (dQ > 0 ? 'delta-pos' : 'delta-neg'));
      const dpCls = dDp === null ? '' : (Math.abs(dDp) < 0.01 ? '' : (dDp > 0 ? 'delta-pos' : 'delta-neg'));
      html += `<tr>
        <td>${d}</td>
        <td>${fmt(b2Q)}</td><td>${fmt(cuQ)}</td>
        <td class="${dCls}">${dQ === null ? '—' : (dQ >= 0 ? '+' : '') + dQ.toFixed(2)}</td>
        <td>${fmt(b2Dp)}</td><td>${fmt(cuDp)}</td>
        <td class="${dpCls}">${dDp === null ? '—' : (dDp >= 0 ? '+' : '') + dDp.toFixed(2)}</td>
        <td>${c && c.sd ? c.sd : '—'}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    $('wz4-overlap-table').innerHTML = html;
  }

  // ─── Часть 2: Базовый период по данным заказчика ─────────────
  // Поток:
  //   1) Грузим всю историю well_daily по скважине (обзорный график Q + ΔP).
  //   2) Клик по точке на обзоре ставит «якорь». Длительность + направление
  //      → диапазон кандидата.
  //   3) Кнопка «+ Добавить кандидата» добавляет его в список.
  //   4) Для каждого кандидата: подгружаются НАШИ данные после масок за тот же
  //      период; рисуется наложение «заказчик ↔ наши» + таблица сравнения.
  //   5) Кнопка «✓ Утвердить B1» пишет выбранный кандидат как baseline в БД.

  async function wz4RenderBaselineSection() {
    const box = $('wz4-section-baseline');
    box.innerHTML = `<div class="wz-section" style="background:#fafafa;">
      <h3>Часть 2. Базовый период по данным заказчика</h3>
      <div style="font-size:0.82rem; color:#666; margin-bottom:0.6rem;">
        Кликните по точке на обзорном графике — это «якорь».
        Затем выберите длительность и направление, добавьте кандидата.
        Для каждого кандидата покажем наложение наших данных за тот же период
        (после масок) и числовое сравнение.
      </div>

      <div id="wz4-overview-loading" style="font-size:0.85rem; color:#888;">⏳ Загружаю данные заказчика…</div>
      <div id="wz4-overview-q" style="height:220px; display:none;"></div>
      <div id="wz4-overview-dp" style="height:200px; display:none; margin-top:0.4rem;"></div>

      <div id="wz4-anchor-controls" style="display:none; margin-top:0.6rem; padding:0.6rem; background:#fff; border:1px solid #e0e0e0; border-radius:5px;">
        <div style="font-size:0.85rem; margin-bottom:0.5rem;">
          Якорь: <b id="wz4-anchor-label" style="color:#1976d2;">—</b>
          <span style="color:#888; margin-left:0.5rem;">(кликните по точке на графике, чтобы изменить)</span>
        </div>
        <div style="display:flex; gap:0.4rem; flex-wrap:wrap; align-items:center;">
          <span>Длительность:</span>
          <button class="wz-btn wz-btn-outline wz-cand-days-btn" data-days="1">1 сут.</button>
          <button class="wz-btn wz-btn-outline wz-cand-days-btn" data-days="3">3 сут.</button>
          <button class="wz-btn wz-btn-outline wz-cand-days-btn" data-days="7">1 нед.</button>
          <button class="wz-btn wz-btn-outline wz-cand-days-btn" data-days="14">2 нед.</button>
          <button class="wz-btn wz-btn-outline wz-cand-days-btn" data-days="30">1 мес.</button>
          <input type="number" id="wz4-cand-days" min="1" max="365" value="14" style="width:5rem;"> сут.
          <span style="margin-left:0.6rem;">от якоря:</span>
          <select id="wz4-cand-dir">
            <option value="back">← назад</option>
            <option value="forward">вперёд →</option>
            <option value="around">↔ вокруг</option>
          </select>
          <span id="wz4-cand-range" style="margin-left:0.6rem; font-size:0.82rem; color:#666;"></span>
          <button class="wz-btn wz-btn-primary" id="wz4-add-cand-btn" style="margin-left:auto;">＋ Добавить кандидата</button>
        </div>
      </div>

      <div id="wz4-cand-list" style="margin-top:1rem;"></div>
    </div>`;

    // Загружаем всю историю заказчика
    state.steps[4].data.customerOverview = null;
    try {
      const wn = state.well.number;
      const r = await fetch(`/api/customer-daily/well/${encodeURIComponent(wn)}`);
      const data = await r.json();
      if (!data.ok || !data.chart || !(data.chart.dates || []).length) {
        $('wz4-overview-loading').innerHTML = '<span style="color:#c62828;">⚠ По этой скважине нет данных в well_daily.</span>';
        wz4RenderCandidateList();
        return;
      }
      state.steps[4].data.customerOverview = data.chart;
      state.steps[4].data.customerDateMin = data.date_min;
      state.steps[4].data.customerDateMax = data.date_max;
      $('wz4-overview-loading').style.display = 'none';
      $('wz4-overview-q').style.display = '';
      $('wz4-overview-dp').style.display = '';
      $('wz4-anchor-controls').style.display = '';
      wz4DrawOverview();
      wz4BindAnchorControls();
      wz4RenderCandidateList();
    } catch (e) {
      $('wz4-overview-loading').innerHTML = `<span style="color:#c62828;">Ошибка загрузки: ${e.message}</span>`;
    }
  }

  function wz4DrawOverview() {
    const cd = state.steps[4].data.customerOverview;
    if (!cd || !window.Plotly) return;
    const baseLayout = (title, ytitle) => ({
      title: {text: title, font: {size: 13}, x: 0.01, xanchor: 'left'},
      margin: {l: 50, r: 15, t: 28, b: 26},
      hovermode: 'x unified',
      xaxis: {type: 'date', tickfont: {size: 10}},
      yaxis: {title: {text: ytitle, font: {size: 10}}, tickfont: {size: 10}, zeroline: false},
      showlegend: false,
    });
    const traceQ = {
      x: cd.dates, y: cd.q_gas_working,
      mode: 'lines+markers',
      line: {color: '#1976D2', width: 2},
      marker: {size: 5, color: '#1976D2'},
      name: 'Q раб',
      hovertemplate: '%{x}: %{y:.2f} тыс.м³/сут<extra></extra>',
    };
    const traceDp = {
      x: cd.dates, y: cd.dp,
      mode: 'lines+markers',
      line: {color: '#9c27b0', width: 2},
      marker: {size: 5, color: '#9c27b0'},
      name: 'ΔP',
      hovertemplate: '%{x}: %{y:.2f} кгс/см²<extra></extra>',
    };
    const cfg = {responsive: true, displayModeBar: false};
    Plotly.newPlot('wz4-overview-q',  [traceQ],  baseLayout('Q рабочий, тыс.м³/сут', 'Q раб'),  cfg);
    Plotly.newPlot('wz4-overview-dp', [traceDp], baseLayout('ΔP, кгс/см²',           'ΔP'),     cfg);
    const onClick = (ev) => {
      if (!ev.points || !ev.points.length) return;
      wz4SetAnchor(ev.points[0].x);
    };
    $('wz4-overview-q').on('plotly_click', onClick);
    $('wz4-overview-dp').on('plotly_click', onClick);
    // Если якорь уже был — отрисуем shape
    if (state.steps[4].data.picker.anchorDate) {
      wz4DrawAnchorShape();
    }
  }

  function wz4SetAnchor(dateStr) {
    // Plotly возвращает дату как 'YYYY-MM-DD' или ISO; нормализуем к YYYY-MM-DD
    const d = String(dateStr).slice(0, 10);
    state.steps[4].data.picker.anchorDate = d;
    $('wz4-anchor-label').textContent = d;
    wz4UpdateRangeLabel();
    wz4DrawAnchorShape();
  }

  function wz4DrawAnchorShape() {
    const p = state.steps[4].data.picker;
    if (!p.anchorDate) return;
    const range = wz4ComputeCandRange();
    const shapes = [];
    if (range) {
      shapes.push({
        type: 'rect', xref: 'x', yref: 'paper',
        x0: range.from, x1: range.to, y0: 0, y1: 1,
        fillcolor: 'rgba(76, 175, 80, 0.15)',
        line: {width: 0},
      });
    }
    shapes.push({
      type: 'line', xref: 'x', yref: 'paper',
      x0: p.anchorDate, x1: p.anchorDate, y0: 0, y1: 1,
      line: {color: '#e53935', width: 2, dash: 'dash'},
    });
    if (window.Plotly) {
      Plotly.relayout('wz4-overview-q',  {shapes});
      Plotly.relayout('wz4-overview-dp', {shapes});
    }
  }

  function wz4BindAnchorControls() {
    document.querySelectorAll('.wz-cand-days-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = parseInt(btn.dataset.days);
        state.steps[4].data.picker.days = v;
        $('wz4-cand-days').value = v;
        wz4UpdateRangeLabel();
        wz4DrawAnchorShape();
      });
    });
    $('wz4-cand-days').addEventListener('input', e => {
      state.steps[4].data.picker.days = parseInt(e.target.value) || 14;
      wz4UpdateRangeLabel();
      wz4DrawAnchorShape();
    });
    $('wz4-cand-dir').addEventListener('change', e => {
      state.steps[4].data.picker.direction = e.target.value;
      wz4UpdateRangeLabel();
      wz4DrawAnchorShape();
    });
    $('wz4-add-cand-btn').addEventListener('click', wz4AddCandidate);
    wz4UpdateRangeLabel();
  }

  function wz4ComputeCandRange() {
    const p = state.steps[4].data.picker;
    if (!p.anchorDate) return null;
    const a = new Date(p.anchorDate + 'T00:00:00');
    const ms = 86400000;
    let from, to;
    if (p.direction === 'back') {
      to = a;
      from = new Date(a.getTime() - (p.days - 1) * ms);
    } else if (p.direction === 'forward') {
      from = a;
      to = new Date(a.getTime() + (p.days - 1) * ms);
    } else {  // around
      const half = Math.floor(p.days / 2);
      from = new Date(a.getTime() - half * ms);
      to = new Date(a.getTime() + (p.days - half - 1) * ms);
    }
    return {from: from.toISOString().slice(0, 10), to: to.toISOString().slice(0, 10)};
  }

  function wz4UpdateRangeLabel() {
    const r = wz4ComputeCandRange();
    const el = $('wz4-cand-range');
    if (!el) return;
    el.textContent = r ? `→ ${r.from} … ${r.to}` : '';
  }

  async function wz4AddCandidate() {
    const range = wz4ComputeCandRange();
    if (!range) { alert('Сначала выберите якорь — кликните по точке на графике.'); return; }
    const cd = state.steps[4].data.customerOverview;
    if (!cd) return;
    // Срез по датам внутри обзора
    const idxs = [];
    for (let i = 0; i < cd.dates.length; i++) {
      if (cd.dates[i] >= range.from && cd.dates[i] <= range.to) idxs.push(i);
    }
    if (!idxs.length) {
      alert('В выбранном диапазоне нет данных заказчика.');
      return;
    }
    const slice = (arr) => idxs.map(i => arr[i]);
    const cust = {
      dates: slice(cd.dates),
      q_gas_working: slice(cd.q_gas_working),
      q_gas_total:   slice(cd.q_gas_total),
      p_wellhead:    slice(cd.p_wellhead),
      p_flowline:    slice(cd.p_flowline),
      dp:            slice(cd.dp),
      shutdown_min:  slice(cd.shutdown_min),
    };
    const id = 'c' + Date.now();
    const cand = {
      id, from: range.from, to: range.to, days: idxs.length,
      anchor: state.steps[4].data.picker.anchorDate,
      direction: state.steps[4].data.picker.direction,
      cust,
      our: null,        // подгрузим ниже
      ourLoading: true,
    };
    state.steps[4].data.candidates.push(cand);
    wz4RenderCandidateList();
    // Параллельно грузим наши данные
    try {
      const r = await fetch(
        `/api/adaptation-report/our-segment?well_id=${state.well.id}` +
        `&date_from=${cand.from}&date_to=${cand.to}`
      );
      const data = await r.json();
      cand.our = data;
    } catch (e) {
      cand.our = {ok: false, error: e.message};
    }
    cand.ourLoading = false;
    wz4RenderCandidateList();
  }

  window.wz4RemoveCandidate = function(id) {
    state.steps[4].data.candidates = (state.steps[4].data.candidates || []).filter(c => c.id !== id);
    wz4RenderCandidateList();
  };

  function wz4CustStats(cust) {
    const meanA = arr => { const v = arr.filter(x => x !== null && !isNaN(x)); return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null; };
    const medA = arr => {
      const v = arr.filter(x => x !== null && !isNaN(x)).slice().sort((a,b)=>a-b);
      if (!v.length) return null; const n = v.length;
      return n % 2 ? v[(n-1)/2] : (v[n/2-1] + v[n/2]) / 2;
    };
    const sd = (cust.shutdown_min || []).filter(x => x);
    return {
      q_work_mean:   meanA(cust.q_gas_working),
      q_work_median: medA(cust.q_gas_working),
      q_total_mean:  meanA(cust.q_gas_total),
      q_total_median: medA(cust.q_gas_total),
      p_wh_mean:     meanA(cust.p_wellhead),
      p_wh_median:   medA(cust.p_wellhead),
      p_fl_mean:     meanA(cust.p_flowline),
      p_fl_median:   medA(cust.p_flowline),
      dp_mean:       meanA(cust.dp),
      dp_median:     medA(cust.dp),
      shutdown_min_total:  sd.reduce((a,b) => a+b, 0),
      shutdown_days_count: sd.length,
    };
  }

  function wz4DeltaPct(a, b) {
    if (a === null || a === undefined || b === null || b === undefined) return null;
    if (Math.abs(a) < 1e-9) return null;
    return (b - a) / a * 100;
  }

  function wz4RenderCandidateList() {
    const box = $('wz4-cand-list');
    if (!box) return;
    const cands = state.steps[4].data.candidates || [];
    const approved = state.steps[4].data.approvedB1;

    let html = '';
    if (approved) {
      html += `<div style="background:#e8f5e9; border-left:4px solid #2e7d32; padding:0.5rem 0.7rem; border-radius:5px; margin-bottom:0.6rem; font-size:0.86rem;">
        ✓ <b>Утверждён baseline B1</b> «${approved.name}» (id ${approved.id}, ${approved.period_from} → ${approved.period_to}).
        Q ср=${fmt(approved.q_working_avg)}, ΔP мед=${fmt(approved.dp_median)}, простой ${approved.shutdown_min_total || 0} мин.
        Эти значения используются в шаге 6.
      </div>`;
    }
    if (!cands.length) {
      html += '<div class="wz-placeholder" style="margin-top:0.4rem;">Кандидатов пока нет. Кликните якорь на обзорном графике и нажмите «＋ Добавить кандидата».</div>';
      box.innerHTML = html;
      return;
    }

    cands.forEach((c, i) => {
      const cs = wz4CustStats(c.cust);
      html += `<div style="border:1px solid #d0d0d0; border-radius:6px; padding:0.7rem; margin-top:0.6rem; background:#fff;">
        <div style="display:flex; align-items:center; gap:0.6rem; margin-bottom:0.4rem;">
          <b style="font-size:0.95rem;">#${i+1} · ${c.from} → ${c.to} (${c.days} сут.)</b>
          <span style="color:#888; font-size:0.8rem;">якорь ${c.anchor}, ${c.direction}</span>
          <button class="wz-btn wz-btn-outline" style="margin-left:auto; padding:0.2rem 0.5rem; font-size:0.78rem;" onclick="wz4RemoveCandidate('${c.id}')">× удалить</button>
          ${custIsAdmin ? `<button class="wz-btn wz-btn-success" style="padding:0.25rem 0.6rem; font-size:0.82rem;" onclick="wz4ApproveB1('${c.id}')">✓ Утвердить как B1</button>` : ''}
        </div>
        <div id="wz4-cand-chart-q-${c.id}" style="height:220px;"></div>
        <div id="wz4-cand-chart-dp-${c.id}" style="height:200px; margin-top:0.3rem;"></div>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:0.3rem; margin-top:0.5rem;">
          <div id="wz4-cand-bar-qmed-${c.id}"  style="height:170px; min-width:0;"></div>
          <div id="wz4-cand-bar-qavg-${c.id}"  style="height:170px; min-width:0;"></div>
          <div id="wz4-cand-bar-dpmed-${c.id}" style="height:170px; min-width:0;"></div>
          <div id="wz4-cand-bar-pwh-${c.id}"   style="height:170px; min-width:0;"></div>
          <div id="wz4-cand-bar-pfl-${c.id}"   style="height:170px; min-width:0;"></div>
        </div>
        <div id="wz4-cand-table-${c.id}" style="margin-top:0.4rem;"></div>
      </div>`;
    });
    box.innerHTML = html;
    cands.forEach(c => wz4DrawCandidate(c));
  }

  function wz4DrawCandidate(c) {
    if (!window.Plotly) return;
    const cust = c.cust;
    const our  = c.our;

    // Перевод абс. дат в «сутки от начала периода» (общая шкала для обоих рядов)
    const fromMs = new Date(c.from + 'T00:00:00').getTime();
    const dayOf = (iso) => (new Date(iso).getTime() - fromMs) / 86400000;
    const custDays = cust.dates.map(d => dayOf(d + 'T00:00:00'));

    const custQ = {
      x: custDays, y: cust.q_gas_working, customdata: cust.dates,
      mode: 'lines+markers', name: 'Заказчик',
      line: {color: '#1976D2', width: 2}, marker: {size: 7, symbol: 'circle'},
      hovertemplate: '<b>Заказчик</b><br>сутки %{x:.0f} (%{customdata}): %{y:.2f}<extra></extra>',
    };
    const custDp = {
      x: custDays, y: cust.dp, customdata: cust.dates,
      mode: 'lines+markers', name: 'Заказчик',
      line: {color: '#9c27b0', width: 2}, marker: {size: 7, symbol: 'circle'},
      hovertemplate: '<b>Заказчик</b><br>сутки %{x:.0f} (%{customdata}): %{y:.2f}<extra></extra>',
    };

    const tracesQ = [custQ];
    const tracesDp = [custDp];
    if (our && our.ok && our.chart_data && our.chart_data.length) {
      const ourDays = our.chart_data.map(p => dayOf(p.t));
      const ourTs   = our.chart_data.map(p => p.t.replace('T', ' '));
      tracesQ.push({
        x: ourDays, y: our.chart_data.map(p => p.q), customdata: ourTs,
        mode: 'lines', name: 'Наши (после масок)',
        line: {color: '#FB8C00', width: 1.5}, opacity: 0.9,
        hovertemplate: '<b>Наши</b><br>сутки %{x:.2f} (%{customdata}): %{y:.2f}<extra></extra>',
      });
      tracesDp.push({
        x: ourDays, y: our.chart_data.map(p => p.dp), customdata: ourTs,
        mode: 'lines', name: 'Наши (после масок)',
        line: {color: '#E53935', width: 1.5}, opacity: 0.9,
        hovertemplate: '<b>Наши</b><br>сутки %{x:.2f} (%{customdata}): %{y:.2f}<extra></extra>',
      });
    }

    const layout = (title, ytitle) => ({
      title: {text: title, font: {size: 12}, x: 0.01, xanchor: 'left'},
      margin: {l: 48, r: 12, t: 26, b: 36},
      hovermode: 'x unified',
      xaxis: {
        title: {text: 'Сутки от начала периода', font: {size: 10}},
        tickfont: {size: 10}, dtick: 1, zeroline: false,
        range: [-0.3, c.days - 0.7],
      },
      yaxis: {title: {text: ytitle, font: {size: 10}}, tickfont: {size: 10}, zeroline: false},
      legend: {orientation: 'h', y: 1.18, x: 0, font: {size: 10}},
    });
    const cfg = {responsive: true, displayModeBar: false};
    Plotly.newPlot(`wz4-cand-chart-q-${c.id}`,  tracesQ,  layout('Q рабочий — заказчик ↔ наши (общая шкала: сутки)', 'Q раб'), cfg);
    Plotly.newPlot(`wz4-cand-chart-dp-${c.id}`, tracesDp, layout('ΔP — заказчик ↔ наши (общая шкала: сутки)',        'ΔP'),    cfg);

    // Бар-чарты сравнения параметров (5 мини-графиков в ряд)
    const csForBars = wz4CustStats(cust);
    const ourSForBars = (our && our.ok && our.stats) ? our.stats : null;
    wz4DrawCompareBars(c, csForBars, ourSForBars);

    // Таблица сравнения
    const cs = wz4CustStats(cust);
    const ourS = (our && our.ok && our.stats) ? our.stats : null;
    const tbox = $(`wz4-cand-table-${c.id}`);
    const row = (label, custVal, ourVal, fmt2 = 2) => {
      const dpct = wz4DeltaPct(custVal, ourVal);
      const cls = dpct === null ? '' : (Math.abs(dpct) < 5 ? 'delta-pos' : (Math.abs(dpct) > 15 ? 'delta-neg' : ''));
      return `<tr>
        <td>${label}</td>
        <td>${custVal === null || custVal === undefined ? '—' : custVal.toFixed(fmt2)}</td>
        <td>${ourVal === null || ourVal === undefined ? (c.ourLoading ? '⏳' : '—') : ourVal.toFixed(fmt2)}</td>
        <td class="${cls}">${dpct === null ? '—' : (dpct >= 0 ? '+' : '') + dpct.toFixed(1) + '%'}</td>
      </tr>`;
    };
    let thtml = `<table class="wz-table" style="font-size:0.82rem;"><thead><tr>
      <th>Параметр</th><th>Заказчик</th><th>Наши</th><th>Δ% (наши↔заказчик)</th>
    </tr></thead><tbody>`;
    thtml += row('Q раб, мед, тыс.м³/сут', cs.q_work_median, ourS ? ourS.flow_median : null);
    thtml += row('Q раб, ср, тыс.м³/сут',  cs.q_work_mean,   ourS ? ourS.flow_avg : null);
    thtml += row('ΔP, мед, кгс/см²',       cs.dp_median,     ourS ? ourS.dp_median : null);
    thtml += row('P устье, мед, кгс/см²',  cs.p_wh_median,   ourS ? ourS.p_tube_median : null);
    thtml += row('P шлейф, мед, кгс/см²',  cs.p_fl_median,   ourS ? ourS.p_line_median : null);
    if (ourS) {
      thtml += `<tr><td>КИВ (наши)</td><td>—</td><td>${ourS.utilization_pct === null ? '—' : ourS.utilization_pct.toFixed(1) + '%'}</td><td>—</td></tr>`;
      thtml += `<tr><td>Простой, ч (наши)</td><td>—</td><td>${ourS.downtime_hours || 0}</td><td>—</td></tr>`;
    }
    thtml += `<tr><td>Простой, мин (заказчик)</td><td>${cs.shutdown_min_total}</td><td>—</td><td>—</td></tr>`;
    thtml += '</tbody></table>';
    if (c.ourLoading) {
      thtml = '<div style="font-size:0.82rem; color:#888; margin-bottom:0.3rem;">⏳ Загружаем наши данные за этот период…</div>' + thtml;
    } else if (!our || !our.ok) {
      thtml = `<div style="font-size:0.82rem; color:#c62828; margin-bottom:0.3rem;">⚠ Не удалось загрузить наши данные за этот период${our && our.error ? ': ' + our.error : ''}.</div>` + thtml;
    }
    tbox.innerHTML = thtml;
  }

  // 5 мини-bar'ов «Заказчик vs Наши» по ключевым параметрам.
  // Каждый со своей шкалой Y (значения сильно разные: Q≈10, ΔP≈1, P≈16).
  function wz4DrawCompareBars(c, cs, ourS) {
    if (!window.Plotly) return;
    const params = [
      {key: 'qmed',  label: 'Q раб мед',   unit: 'тыс.м³/сут', cust: cs.q_work_median, our: ourS ? ourS.flow_median   : null},
      {key: 'qavg',  label: 'Q раб ср',    unit: 'тыс.м³/сут', cust: cs.q_work_mean,   our: ourS ? ourS.flow_avg      : null},
      {key: 'dpmed', label: 'ΔP мед',      unit: 'кгс/см²',    cust: cs.dp_median,     our: ourS ? ourS.dp_median     : null},
      {key: 'pwh',   label: 'P уст мед',   unit: 'кгс/см²',    cust: cs.p_wh_median,   our: ourS ? ourS.p_tube_median : null},
      {key: 'pfl',   label: 'P шлейф мед', unit: 'кгс/см²',    cust: cs.p_fl_median,   our: ourS ? ourS.p_line_median : null},
    ];
    params.forEach(p => {
      const id = `wz4-cand-bar-${p.key}-${c.id}`;
      const el = document.getElementById(id);
      if (!el) return;
      const ourVal = (p.our === null || p.our === undefined) ? null : p.our;
      const custVal = (p.cust === null || p.cust === undefined) ? null : p.cust;
      const dpct = wz4DeltaPct(custVal, ourVal);
      const titleSuffix = dpct === null ? '' : ` (Δ ${dpct >= 0 ? '+' : ''}${dpct.toFixed(1)}%)`;
      const titleColor = dpct === null ? '#666' : (Math.abs(dpct) < 5 ? '#2e7d32' : (Math.abs(dpct) > 15 ? '#c62828' : '#666'));
      const fmt2 = v => v === null ? '—' : v.toFixed(2);
      const trace = {
        type: 'bar',
        x: ['Заказчик', 'Наши'],
        y: [custVal, ourVal],
        marker: {color: ['#1976D2', '#FB8C00']},
        text: [fmt2(custVal), fmt2(ourVal)],
        textposition: 'outside',
        textfont: {size: 11},
        cliponaxis: false,
        hovertemplate: '%{x}: %{y:.3f}<extra></extra>',
      };
      const vals = [custVal, ourVal].filter(v => v !== null);
      const ymax = vals.length ? Math.max(...vals) * 1.25 + 0.001 : 1;
      const layout = {
        title: {
          text: `<b>${p.label}</b><br><span style="font-size:9px; color:${titleColor};">${p.unit}${titleSuffix}</span>`,
          font: {size: 10}, x: 0.5, xanchor: 'center', y: 0.95,
        },
        margin: {l: 36, r: 8, t: 36, b: 22},
        yaxis: {tickfont: {size: 9}, range: [0, ymax], zeroline: true},
        xaxis: {tickfont: {size: 10}},
        showlegend: false,
        bargap: 0.4,
      };
      Plotly.newPlot(id, [trace], layout, {responsive: true, displayModeBar: false});
    });
  }

  window.wz4ApproveB1 = async function(id) {
    const cand = (state.steps[4].data.candidates || []).find(c => c.id === id);
    if (!cand) return;
    const defaultName = `B1 Заказчик ${cand.from} — ${cand.to}`;
    const name = prompt('Название baseline B1:', defaultName);
    if (!name) return;
    const notes = prompt('Заметки (опционально):') || '';

    if (state.steps[4].data.approvedB1) {
      if (!confirm(`Уже существует утверждённый B1 «${state.steps[4].data.approvedB1.name}». Перезаписать?`)) return;
      try {
        await fetch(`/api/adaptation-report/baselines/${state.steps[4].data.approvedB1.id}`, {method: 'DELETE'});
      } catch (e) {}
    }
    const cs = wz4CustStats(cand.cust);
    const stats = {
      days_count: cand.days,
      q_total_avg: cs.q_total_mean, q_total_median: cs.q_total_median,
      q_working_avg: cs.q_work_mean, q_working_median: cs.q_work_median,
      p_wellhead_avg: cs.p_wh_mean, p_wellhead_median: cs.p_wh_median,
      p_flowline_avg: cs.p_fl_mean, p_flowline_median: cs.p_fl_median,
      dp_avg: cs.dp_mean, dp_median: cs.dp_median,
      shutdown_min_total: cs.shutdown_min_total,
      shutdown_min_avg: null, shutdown_days_count: cs.shutdown_days_count,
    };
    const r = await fetch('/api/adaptation-report/baselines', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        well_id: state.well.id, name,
        source: 'customer',
        period_from: cand.from, period_to: cand.to,
        notes, precomputed_stats: stats,
      }),
    });
    const res = await r.json();
    if (res.ok) {
      state.steps[4].data.approvedB1 = res.baseline;
      wz4RenderCandidateList();
      alert(`✓ Baseline B1 утверждён.\nQ ср=${fmt(cs.q_work_mean)}, ΔP мед=${fmt(cs.dp_median)}, простой ${cs.shutdown_min_total} мин.`);
    } else {
      alert(res.detail || 'Ошибка сохранения');
    }
  };

  // Загружаем уже утверждённый B1 при выборе скважины (дёргается из обработчика wells)
  async function wz4LoadExistingB1() {
    if (!state.well || !state.well.id) return;
    try {
      const r = await fetch(`/api/adaptation-report/baselines?well_id=${state.well.id}`);
      const data = await r.json();
      const b1 = (data.baselines || []).filter(b => b.source === 'customer');
      if (b1.length > 0) state.steps[4].data.approvedB1 = b1[0];
    } catch (e) {}
  }

  // ═══ STEP 5: Адаптация — селектор источника длительности ═══

    if (!d.duration_source) d.duration_source = 'days_10';
    if (d.duration_days === undefined) d.duration_days = 10;
    if (!d.optimal_window_days) d.optimal_window_days = 3;

    const m = state.metadata || {};

    const obsEnd = state.steps[3].data.to;
    if (obsEnd && !d.from) d.from = obsEnd;

    // Источники длительности
    const dbAdaptTo = ss && ss.adapt_to ? ss.adapt_to.slice(0, 16) : null;
