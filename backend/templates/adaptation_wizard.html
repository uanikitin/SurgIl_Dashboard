{% extends "base.html" %}

{% block title %}Сборка отчёта об адаптации{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
  /* предотвращаем горизонтальный скролл всей страницы */
  html, body { overflow-x: hidden; }

  .wz-page {
    display: grid; grid-template-columns: 240px minmax(0, 1fr);
    gap: 1rem; padding: 1rem;
    min-height: calc(100vh - 130px);
    max-width: 100%; box-sizing: border-box;
  }
  @media (max-width: 1100px) { .wz-page { grid-template-columns: minmax(0, 1fr); } }
  /* min-width: 0 — критично, чтобы Plotly графики не раздували grid-item шире viewport */
  .wz-stepper, .wz-main { min-width: 0; }

  /* ─── Header bar ─── */
  .wz-header {
    grid-column: 1 / -1;
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    padding: 0.7rem 1rem;
  }
  .wz-header-top {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 0.6rem;
  }
  .wz-header h1 {
    margin: 0; font-size: 1.05rem; font-weight: 500;
  }
  .wz-header .wz-well-pick {
    margin-left: auto; display: flex; gap: 0.5rem; align-items: center;
  }
  .wz-header select {
    padding: 0.35rem 0.6rem; border: 1px solid #ccc;
    border-radius: 5px; font-size: 0.88rem; min-width: 200px;
  }
  .wz-back {
    color: #555; text-decoration: none; font-size: 0.85rem;
    padding: 0.3rem 0.6rem; border-radius: 4px;
    border: 1px solid #ddd;
  }
  .wz-back:hover { background: #f5f5f5; }

  /* ─── Overview cards (in header) ─── */
  .wz-overview {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0.6rem; margin-bottom: 0.6rem;
  }
  .wz-card {
    background: #fafafa; border: 1px solid #e0e0e0;
    border-radius: 6px; padding: 0.5rem 0.7rem;
  }
  .wz-card .wz-card-title {
    font-size: 0.72rem; color: #666; text-transform: uppercase;
    letter-spacing: 0.04em; margin-bottom: 0.3rem;
  }
  .wz-card .wz-card-body { font-size: 0.85rem; color: #1e293b; line-height: 1.4; }
  .wz-card .wz-card-body b { color: #1565c0; }
  .wz-card.wz-card-warn { background: #fff8e1; border-color: #ffd54f; }
  .wz-card.wz-card-empty { background: #fafafa; color: #aaa; font-style: italic; }
  .wz-card-row { display: flex; justify-content: space-between; gap: 0.4rem; }

  /* ─── Chapter tiles ─── */
  .wz-tiles {
    display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 0.4rem; margin-bottom: 0.2rem;
  }
  @media (max-width: 1400px) { .wz-tiles { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
  @media (max-width: 800px)  { .wz-tiles { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
  .wz-tile {
    background: #fff; border: 1px solid #ddd; border-radius: 5px;
    padding: 0.4rem 0.5rem; cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; gap: 0.15rem;
  }
  .wz-tile:hover { border-color: #1976D2; }
  .wz-tile.done { background: #e8f5e9; border-color: #4caf50; }
  .wz-tile.included { border-left: 4px solid #2e7d32; }
  .wz-tile.excluded { opacity: 0.5; }
  .wz-tile .tile-num { font-size: 0.7rem; color: #888; font-weight: 600; }
  .wz-tile .tile-name { font-size: 0.78rem; color: #1e293b; font-weight: 500; }
  .wz-tile .tile-status { font-size: 0.7rem; color: #666; }

  /* ─── Stepper (left nav) ─── */
  .wz-stepper {
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    padding: 0.6rem; height: fit-content;
    position: sticky; top: 1rem;
  }
  .wz-step {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.55rem 0.7rem; border-radius: 6px;
    cursor: pointer; font-size: 0.86rem;
    color: #555; transition: background 0.12s;
    margin-bottom: 0.2rem;
  }
  .wz-step:hover { background: #f5f5f5; }
  .wz-step.active {
    background: #e3f2fd; color: #1565c0; font-weight: 500;
  }
  .wz-step .num {
    width: 24px; height: 24px; border-radius: 50%;
    background: #f5f5f5; color: #666;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-weight: 600; flex-shrink: 0;
  }
  .wz-step.active .num { background: #1976D2; color: #fff; }
  .wz-step.done .num { background: #4caf50; color: #fff; }
  .wz-step.done .num::before { content: '✓'; }
  .wz-step.done .num .num-text { display: none; }
  .wz-step.warn .num { background: #ff9800; color: #fff; }
  .wz-step .label { flex: 1; line-height: 1.2; }
  .wz-step .sub { font-size: 0.72rem; color: #888; display: block; margin-top: 0.1rem; }

  .wz-included-count {
    margin-top: 0.5rem; padding: 0.5rem 0.7rem;
    background: #f0f7ff; border: 1px solid #cfe5ff;
    border-radius: 5px; font-size: 0.82rem; color: #1565c0;
    display: flex; align-items: center; gap: 0.4rem;
  }

  /* ─── Main panel ─── */
  .wz-main {
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    padding: 1.2rem;
    overflow-x: hidden;
  }
  .wz-main > *, .wz-section, .wz-section > div { min-width: 0; }
  /* широкие таблицы пусть скроллятся внутри своего контейнера */
  .wz-table { display: table; }
  .wz-step-title {
    margin: 0 0 0.3rem; font-size: 1.2rem; color: #1565c0;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .wz-step-title .step-num {
    background: #1976D2; color: #fff;
    width: 28px; height: 28px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
  }
  .wz-step-hint {
    color: #666; font-size: 0.88rem; margin-bottom: 1rem;
  }

  .wz-section {
    border-top: 1px solid #eee;
    padding: 0.8rem 0; margin-top: 0.8rem;
  }
  .wz-section:first-of-type { border-top: none; padding-top: 0; }
  .wz-section h3 {
    margin: 0 0 0.4rem; font-size: 0.95rem; color: #444;
  }

  .wz-field { margin-bottom: 0.6rem; }
  .wz-field label {
    display: block; font-size: 0.8rem; color: #666; margin-bottom: 0.2rem;
  }
  .wz-field input, .wz-field select, .wz-field textarea {
    width: 100%; padding: 0.4rem 0.55rem; border: 1px solid #ccc;
    border-radius: 5px; font-size: 0.88rem; box-sizing: border-box;
    font-family: inherit;
  }
  .wz-field textarea { resize: vertical; min-height: 70px; }

  .wz-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.6rem; }

  .wz-include {
    background: #f0f7ff; border: 1px dashed #cfe5ff;
    padding: 0.6rem 0.8rem; border-radius: 5px; margin-top: 0.8rem;
  }
  .wz-include label {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.9rem; color: #1565c0; cursor: pointer;
  }
  .wz-include input { width: auto; margin: 0; }

  /* ─── Buttons ─── */
  .wz-btn {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.5rem 1rem; border: none; border-radius: 5px;
    font-size: 0.88rem; cursor: pointer; color: #fff;
  }
  .wz-btn-primary { background: #1976D2; }
  .wz-btn-primary:hover { background: #0d47a1; }
  .wz-btn-secondary { background: #757575; }
  .wz-btn-success { background: #2e7d32; }
  .wz-btn-success:hover { background: #1b5e20; }
  .wz-btn-outline {
    background: #fff; color: #1976D2; border: 1px solid #1976D2;
  }
  .wz-btn-outline:hover { background: #e3f2fd; }

  /* кнопки «Назад / Далее» — sticky к нижней границе viewport, всегда видны */
  .wz-nav-buttons {
    margin-top: 1.5rem; display: flex; gap: 0.5rem;
    padding: 0.7rem 0; border-top: 1px solid #eee;
    position: sticky; bottom: 0;
    background: #fff; z-index: 5;
  }
  .wz-nav-buttons .right { margin-left: auto; }

  /* ─── Preview blocks ─── */
  .wz-preview-card {
    background: #fafafa; border: 1px solid #e0e0e0;
    border-radius: 6px; padding: 0.8rem; margin: 0.6rem 0;
  }
  .wz-preview-stat {
    display: inline-flex; gap: 0.4rem;
    padding: 0.25rem 0.6rem; background: #fff;
    border: 1px solid #ddd; border-radius: 4px;
    font-size: 0.85rem; margin: 0.2rem 0.3rem 0.2rem 0;
  }
  .wz-preview-stat b { color: #1565c0; }

  .wz-info {
    background: #e8f5e9; border-left: 3px solid #2e7d32;
    padding: 0.4rem 0.7rem; border-radius: 4px;
    font-size: 0.82rem; margin: 0.4rem 0;
  }
  .wz-warn {
    background: #fff8e1; border-left: 3px solid #f57f17;
    padding: 0.4rem 0.7rem; border-radius: 4px;
    font-size: 0.82rem; margin: 0.4rem 0;
  }
  .wz-error {
    background: #ffebee; border-left: 3px solid #c62828;
    padding: 0.4rem 0.7rem; border-radius: 4px;
    font-size: 0.82rem; margin: 0.4rem 0;
  }

  .wz-placeholder {
    color: #888; text-align: center; padding: 2rem;
    background: #fafafa; border-radius: 6px; font-size: 0.9rem;
  }

  .wz-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
  .wz-table th, .wz-table td {
    padding: 0.35rem 0.5rem; border-bottom: 1px solid #eee;
    text-align: right;
  }
  .wz-table th:first-child, .wz-table td:first-child { text-align: left; }
  .wz-table th { background: #f5f5f5; font-weight: 500; color: #555; }

  .wz-pdf-iframe { width: 100%; height: 700px; border: 1px solid #ddd; border-radius: 6px; }
  .wz-loading {
    text-align: center; color: #666; padding: 2rem;
    background: #fafafa; border-radius: 6px;
  }
  .wz-spinner {
    width: 24px; height: 24px; border: 3px solid #eee;
    border-top-color: #1976D2; border-radius: 50%;
    animation: wz-spin 1s linear infinite;
    display: inline-block; vertical-align: middle; margin-right: 0.5rem;
  }
  @keyframes wz-spin { to { transform: rotate(360deg); } }

  /* ─── Period builder timeline (wizard step 2) ─── */
  .tl2-builder {
    margin-bottom: 0.6rem;
    background: #fafafa; border: 1px solid #e5e7eb; border-radius: 6px;
    padding: 10px 12px;
  }
  .tl2-zoom-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; font-size: 0.78rem; color: #6b7280;
  }
  .tl2-zoom-btn {
    padding: 3px 10px; font-size: 0.76rem; background: #fff;
    border: 1px solid #d1d5db; border-radius: 999px; cursor: pointer;
    color: #374151;
  }
  .tl2-zoom-btn:hover { background: #eff6ff; border-color: #93c5fd; }
  .tl2-zoom-btn.active {
    background: #2563eb; color: #fff; border-color: #1d4ed8;
  }
  .tl2-scroll {
    width: 100%; overflow-x: auto; overflow-y: hidden;
    background: #fff; border: 1px solid #e5e7eb; border-radius: 4px;
    padding: 6px 0; margin-bottom: 4px;
  }
  /* Этап как точка-кружок */
  .tl2-stage-dot {
    position: absolute; top: 6px;
    width: 14px; height: 14px; border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 0 2px #fff, 0 1px 4px rgba(0,0,0,0.2);
    transform: translateX(-50%);
    cursor: pointer; pointer-events: auto;
    transition: transform 0.1s;
  }
  .tl2-stage-dot:hover { transform: translateX(-50%) scale(1.4); }
  .tl2-range-label {
    position: absolute; top: -2px;
    background: rgba(220,38,38,0.85); color: #fff;
    font-size: 0.66rem; font-weight: 600;
    padding: 1px 5px; border-radius: 2px;
    white-space: nowrap;
  }
  .tl2-help {
    font-size: 0.7rem; color: #9ca3af; margin-top: 4px;
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .tl2-help b { color: #4b5563; }
  .tl2-mode-row {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.84rem; color: #374151; margin-bottom: 0.4rem;
    flex-wrap: wrap;
  }
  .tl2-mode-row b { color: #1565c0; }
  .tl2-mode-row .tl2-period-display {
    margin-left: auto; font-family: monospace; color: #555;
    font-size: 0.78rem;
  }
  .tl2-scale {
    position: relative; height: 110px; min-width: 100%;
    cursor: crosshair; user-select: none;
  }
  .tl2-bar {
    position: absolute; height: 16px; border-radius: 3px;
    pointer-events: none;
  }
  .tl2-bar-customer { top: 38px; background: #93c5fd; }
  .tl2-bar-our      { top: 60px; background: #6ee7b7; }
  .tl2-bar-label {
    position: absolute; left: 6px; font-size: 0.66rem;
    color: rgba(0,0,0,0.7); line-height: 16px; pointer-events: none;
  }
  .tl2-stage-line {
    position: absolute; top: 12px; height: 88px;
    width: 2px; background: currentColor; opacity: 0.45;
    transform: translateX(-50%); pointer-events: none;
  }
  .tl2-stage-label {
    position: absolute; top: 22px;
    background: currentColor; color: #fff;
    font-size: 0.66rem; font-weight: 600;
    padding: 1px 5px; border-radius: 2px;
    white-space: nowrap; transform: translateX(-50%);
    pointer-events: none;
  }
  .tl2-anchor {
    position: absolute; top: 0; bottom: 0; width: 0; pointer-events: none;
  }
  .tl2-anchor-line {
    position: absolute; top: 0; bottom: 0; left: -1px;
    width: 2px; background: #dc2626;
    box-shadow: 0 0 4px rgba(220,38,38,0.5);
  }
  .tl2-anchor-label {
    position: absolute; bottom: -1px; left: 5px;
    background: #dc2626; color: #fff;
    font-size: 0.72rem; font-weight: 600;
    padding: 2px 6px; border-radius: 2px;
    white-space: nowrap; pointer-events: none;
  }
  .tl2-range {
    position: absolute; top: 26px; height: 44px;
    background: rgba(220,38,38,0.10);
    border-left: 1px dashed rgba(220,38,38,0.4);
    border-right: 1px dashed rgba(220,38,38,0.4);
    pointer-events: none;
  }
  .tl2-axis {
    position: absolute; bottom: 2px; left: 0; right: 0;
    height: 14px; pointer-events: none;
  }
  .tl2-axis-tick {
    position: absolute; top: 0; font-size: 0.62rem;
    color: #6b7280; transform: translateX(-50%); white-space: nowrap;
  }
  .tl2-axis-tick::before {
    content: ""; display: block; width: 1px; height: 4px;
    background: #9ca3af; margin: 0 auto 1px;
  }
  .tl2-controls-row {
    display: flex; align-items: center; gap: 0.35rem;
    flex-wrap: wrap; font-size: 0.78rem;
    margin-bottom: 0.35rem;
  }
  .tl2-controls-label { color: #374151; font-weight: 500; min-width: 7.5rem; }
  .tl2-btn {
    padding: 0.22rem 0.55rem; font-size: 0.76rem;
    background: #fff; border: 1px solid #cbd5e1;
    border-radius: 3px; cursor: pointer; color: #1f2937;
  }
  .tl2-btn:hover { background: #eff6ff; border-color: #93c5fd; }
  .tl2-btn.active { background: #2563eb; color: #fff; border-color: #1d4ed8; }
  .tl2-date-input {
    padding: 0.22rem 0.45rem; font-size: 0.78rem;
    border: 1px solid #cbd5e1; border-radius: 3px;
    width: 8.5rem;
  }
  .tl2-divider { width: 1px; height: 22px; background: #d4d4d8; margin: 0 0.3rem; }
</style>
{% endblock %}

{% block content %}
<div class="wz-page">

  <!-- Header -->
  <div class="wz-header">
    <div class="wz-header-top">
      <h1>📋 Сборка отчёта об адаптации</h1>
      <div class="wz-well-pick">
        <span style="font-size: 0.85rem; color: #666;">Скважина:</span>
        <select id="wz-well-select">
          <option value="">— выбрать —</option>
        </select>
        <a href="/adaptation-report" class="wz-back">← старая страница</a>
      </div>
    </div>

    <!-- Overview cards: well info + stages + key events -->
    <div class="wz-overview" id="wz-overview"></div>

    <!-- Chapter tiles -->
    <div class="wz-tiles" id="wz-tiles"></div>
  </div>

  <!-- Stepper -->
  <div class="wz-stepper" id="wz-stepper">
    <!-- generated by JS -->
  </div>

  <!-- Main content -->
  <div class="wz-main" id="wz-main">
    <div class="wz-placeholder">
      Выберите скважину чтобы начать сборку отчёта.
    </div>
  </div>

</div>

<script>
  const $ = (id) => document.getElementById(id);
  const custIsAdmin = {{ 'true' if is_admin else 'false' }};

  // ═══ State ═══
  const state = {
    well: null,            // {id, number, name, horizon, choke_mm}
    currentStep: 1,
    steps: {
      1: { title: 'Скважина', sub: 'описание объекта',
           include: true,  status: 'todo', data: { work_start: '', desc: '' } },
      2: { title: 'Заказчик (B1)', sub: 'исходные данные',
           include: false, status: 'todo', data: { periods: [] } },
      3: { title: 'Наблюдение (B2)', sub: 'наши данные до работ',
           include: true,  status: 'todo', data: {} },
      4: { title: 'Кросс-валидация', sub: 'наши ↔ заказчик',
           include: false, status: 'todo', data: {} },
      5: { title: 'Адаптация', sub: 'этап + оптимум R★',
           include: true,  status: 'todo', data: {} },
      6: { title: 'Сводное сравнение', sub: 'B1/B2/R/R★',
           include: true,  status: 'todo', data: {} },
      7: { title: 'Сборка отчёта', sub: 'предпросмотр + PDF',
           include: true,  status: 'todo', data: {} },
    },
  };

  // ═══ Stepper rendering ═══
  function renderStepper() {
    const box = $('wz-stepper');
    let html = '';
    const ids = Object.keys(state.steps).map(Number);
    for (const i of ids) {
      const s = state.steps[i];
      const isActive = i === state.currentStep;
      const cls = ['wz-step'];
      if (isActive) cls.push('active');
      if (s.status === 'done') cls.push('done');
      if (s.status === 'warn') cls.push('warn');
      const numText = s.status === 'done' ? '' : i;
      html += `
        <div class="${cls.join(' ')}" data-step="${i}">
          <div class="num"><span class="num-text">${numText}</span></div>
          <div class="label">
            ${s.title}
            <span class="sub">${s.sub}</span>
          </div>
        </div>
      `;
    }
    const includedCount = Object.values(state.steps).filter(s => s.include).length;
    html += `<div class="wz-included-count">📦 Включено в PDF: <b>${includedCount}</b> из 7</div>`;
    box.innerHTML = html;
    box.querySelectorAll('.wz-step').forEach(el => {
      el.addEventListener('click', () => goToStep(parseInt(el.dataset.step)));
    });
  }

  function goToStep(n) {
    state.currentStep = n;
    renderStepper();
    renderStep(n);
  }

  // ═══ Steps content ═══
  function renderStep(n) {
    const main = $('wz-main');
    if (!state.well) {
      main.innerHTML = '<div class="wz-placeholder">Сначала выберите скважину сверху.</div>';
      return;
    }
    const renderers = {
      1: renderStep1,
      2: renderStep2,
      3: renderStep3,
      4: renderStep4,
      5: renderStep5,
      6: renderStep6,
      7: renderStep7,
    };
    const fn = renderers[n];
    if (fn) fn(main);
  }

  function navButtons(n) {
    const prev = n > 1 ? `<button class="wz-btn wz-btn-outline" onclick="goToStep(${n-1})">← Назад</button>` : '';
    const next = n < 7 ? `<button class="wz-btn wz-btn-primary right" onclick="goToStep(${n+1})">Далее →</button>` : '';
    return `<div class="wz-nav-buttons">${prev}${next}</div>`;
  }

  function includeBlock(n, label = 'Включить эту главу в PDF') {
    const checked = state.steps[n].include ? 'checked' : '';
    return `<div class="wz-include">
      <label>
        <input type="checkbox" id="wz-include-${n}" ${checked}>
        ${label}
      </label>
    </div>`;
  }

  function bindIncludeBlock(n) {
    const cb = $(`wz-include-${n}`);
    if (!cb) return;
    cb.addEventListener('change', () => {
      state.steps[n].include = cb.checked;
      renderStepper();
      renderTiles();
    });
  }

  // ═══ STEP 1: Описание скважины ═══
  function renderStep1(main) {
    const w = state.well;
    const d = state.steps[1].data;

    const m = state.metadata || {};
    const ss = m.stages_status;
    const se = m.stages_events;

    // Доступные источники даты + их дата (без времени)
    const sources = [
      {
        key: 'manometer',
        label: 'Дата установки манометров',
        date: se && se.obs_from ? se.obs_from.slice(0, 10) : null,
      },
      {
        key: 'obs',
        label: 'Начало этапа Наблюдения (БД)',
        date: ss && ss.obs_from ? ss.obs_from.slice(0, 10) : null,
      },
      {
        key: 'adapt',
        label: 'Начало этапа Адаптации (БД)',
        date: ss && ss.adapt_from ? ss.adapt_from.slice(0, 10) : null,
      },
      {
        key: 'first_reagent',
        label: 'Первый вброс реагента (события)',
        date: se && se.adapt_from ? se.adapt_from.slice(0, 10) : null,
      },
      { key: 'manual', label: 'Указать вручную', date: null },
    ];

    // Дефолт: дата установки манометров (если есть). Иначе первый доступный источник, иначе manual.
    if (!d.work_start_source) {
      const manoSrc = sources.find(s => s.key === 'manometer' && s.date);
      if (manoSrc) {
        d.work_start_source = 'manometer';
        if (!d.work_start) d.work_start = manoSrc.date;
      } else {
        const auto = sources.find(s => s.date);
        if (auto) {
          d.work_start_source = auto.key;
          if (!d.work_start) d.work_start = auto.date;
        } else {
          d.work_start_source = 'manual';
        }
      }
    }

    let sourcesHtml = '<div style="display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.5rem;">';
    for (const s of sources) {
      const isActive = d.work_start_source === s.key;
      const disabled = s.key !== 'manual' && !s.date;
      sourcesHtml += `
        <label style="display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.6rem;
                      border: 1px solid ${isActive ? '#1976D2' : '#ddd'};
                      background: ${isActive ? '#e3f2fd' : '#fff'};
                      border-radius: 5px; cursor: ${disabled ? 'not-allowed' : 'pointer'};
                      opacity: ${disabled ? 0.5 : 1}; font-size: 0.86rem;">
          <input type="radio" name="wz1-src" value="${s.key}" ${isActive ? 'checked' : ''}
                 ${disabled ? 'disabled' : ''} style="margin: 0;">
          <span style="flex: 1;">${s.label}</span>
          <span style="color: #555; font-weight: 500;">${s.date || (s.key === 'manual' ? 'своя дата →' : '— нет —')}</span>
        </label>
      `;
    }
    sourcesHtml += '</div>';

    // ── Баннер с найденной датой ──────────────────────────────────
    // Состояния:
    //   • не утверждено + есть авто-источник → жёлтый, «Утвердить / Изменить»
    //   • утверждено                          → зелёный «✓ Дата утверждена»
    //   • manual                              → серая подсказка
    const activeSrc = sources.find(s => s.key === d.work_start_source);
    const fmtDate = (iso) => {
      if (!iso) return '—';
      const dt = new Date(iso); if (isNaN(dt.getTime())) return iso;
      return dt.toLocaleDateString('ru-RU', {day:'2-digit', month:'long', year:'numeric'});
    };
    let bannerHtml = '';
    if (d.work_start_source !== 'manual' && activeSrc && activeSrc.date) {
      if (d.work_start_confirmed) {
        bannerHtml = `
          <div style="background:#e8f5e9; border-left:4px solid #2e7d32; padding:0.7rem 0.9rem; border-radius:5px; margin-bottom:0.6rem; display:flex; align-items:center; gap:0.7rem;">
            <span style="font-size:1.3rem;">✓</span>
            <div style="flex:1; font-size:0.9rem; line-height:1.45;">
              <b style="color:#1b5e20;">Дата утверждена:</b>
              <b style="font-size:1.05rem; color:#1b5e20;">${fmtDate(activeSrc.date)}</b>
              <span style="color:#555;">— по событию «${activeSrc.label}»</span>
            </div>
            <button type="button" id="wz1-unconfirm" class="wz-btn wz-btn-outline" style="font-size:0.8rem; padding:0.25rem 0.6rem;">Изменить</button>
          </div>
        `;
      } else {
        bannerHtml = `
          <div style="background:#fff3cd; border-left:4px solid #f57f17; padding:0.7rem 0.9rem; border-radius:5px; margin-bottom:0.6rem;">
            <div style="display:flex; align-items:center; gap:0.7rem; flex-wrap:wrap;">
              <span style="font-size:1.3rem;">📌</span>
              <div style="flex:1; min-width:220px; font-size:0.9rem; line-height:1.45;">
                <span style="color:#5d4037;">Найдена дата:</span>
                <b style="font-size:1.1rem; color:#5d4037;">${fmtDate(activeSrc.date)}</b><br>
                <span style="color:#5d4037; font-size:0.84rem;">по событию «<b>${activeSrc.label}</b>»</span>
              </div>
              <div style="display:flex; gap:0.4rem;">
                <button type="button" id="wz1-confirm" class="wz-btn wz-btn-success" style="font-size:0.85rem; padding:0.4rem 0.9rem;">✓ Утвердить</button>
                <button type="button" id="wz1-change" class="wz-btn wz-btn-outline" style="font-size:0.85rem; padding:0.4rem 0.9rem;">✎ Изменить</button>
              </div>
            </div>
          </div>
        `;
      }
    } else if (d.work_start_source === 'manual' && d.work_start) {
      bannerHtml = `
        <div style="background:#e3f2fd; border-left:4px solid #1976d2; padding:0.55rem 0.9rem; border-radius:5px; margin-bottom:0.6rem; font-size:0.86rem; color:#0d47a1;">
          ✎ <b>Дата задана вручную:</b> ${fmtDate(d.work_start)}
        </div>
      `;
    } else {
      bannerHtml = `
        <div style="background:#fafafa; border-left:4px solid #9e9e9e; padding:0.55rem 0.9rem; border-radius:5px; margin-bottom:0.6rem; font-size:0.86rem; color:#555;">
          ⚠ Авто-источник не найден — введите дату вручную.
        </div>
      `;
    }

    main.innerHTML = `
      <h2 class="wz-step-title"><span class="step-num">1</span>Описание скважины</h2>
      <div class="wz-step-hint">Базовые данные об объекте, дата начала работ, описание.</div>

      <div class="wz-section">
        <h3>Параметры скважины (из БД)</h3>
        <div class="wz-preview-card">
          <span class="wz-preview-stat">№ <b>${w.number}</b></span>
          <span class="wz-preview-stat">${w.name || ''}</span>
          <span class="wz-preview-stat">Горизонт: <b>${w.horizon || '—'}</b></span>
          <span class="wz-preview-stat">Штуцер: <b>${w.choke_mm || '—'}</b> мм</span>
        </div>
      </div>

      <div class="wz-section">
        <h3>Дата начала работ</h3>
        ${bannerHtml}
        <details ${d.work_start_confirmed ? '' : 'open'} style="margin-bottom:0.4rem;">
          <summary style="cursor:pointer; font-size:0.84rem; color:#1976D2; user-select:none;">
            Все доступные источники даты
          </summary>
          <div style="font-size: 0.8rem; color: #666; margin: 0.4rem 0;">
            Выберите источник — дата подставится в поле ниже.
          </div>
          ${sourcesHtml}
        </details>
        <div class="wz-field">
          <label>Итоговая дата <span style="color:#888; font-weight:400; font-size:0.78rem;">(можно править вручную)</span></label>
          <input type="date" id="wz-work-start" value="${d.work_start || ''}">
        </div>
      </div>

      <div class="wz-section">
        <h3>Описание / введение к отчёту</h3>
        <textarea id="wz-desc" rows="4" placeholder="Можно оставить пустым — попадёт в раздел 1 PDF.">${d.desc || ''}</textarea>
      </div>

      ${includeBlock(1, 'Включить раздел «Описание скважины» в PDF')}
      ${navButtons(1)}
    `;

    // Кнопки баннера
    const btnConfirm = document.getElementById('wz1-confirm');
    if (btnConfirm) {
      btnConfirm.addEventListener('click', () => {
        d.work_start_confirmed = true;
        markStatus(1, 'done');
        renderStep1(main);
      });
    }
    const btnChange = document.getElementById('wz1-change');
    if (btnChange) {
      btnChange.addEventListener('click', () => {
        d.work_start_source = 'manual';
        d.work_start_confirmed = false;
        renderStep1(main);
        const inp = $('wz-work-start');
        if (inp) { inp.focus(); try { inp.showPicker && inp.showPicker(); } catch (_) {} }
      });
    }
    const btnUnconfirm = document.getElementById('wz1-unconfirm');
    if (btnUnconfirm) {
      btnUnconfirm.addEventListener('click', () => {
        d.work_start_confirmed = false;
        renderStep1(main);
      });
    }

    // Обработчики radio
    document.querySelectorAll('input[name="wz1-src"]').forEach(el => {
      el.addEventListener('change', () => {
        d.work_start_source = el.value;
        d.work_start_confirmed = false;  // смена источника → требует нового подтверждения
        const src = sources.find(s => s.key === el.value);
        if (src && src.date) {
          d.work_start = src.date;
          $('wz-work-start').value = src.date;
        }
        markStatus(1, 'done');
        // Перерисовать чтобы обновить визуал radio
        renderStep1(main);
      });
    });

    // Поле всегда редактируемое: правка вручную → переключаем источник в 'manual'
    $('wz-work-start').addEventListener('change', e => {
      d.work_start = e.target.value;
      if (d.work_start_source !== 'manual') {
        const src = sources.find(s => s.key === d.work_start_source);
        if (!src || src.date !== e.target.value) {
          d.work_start_source = 'manual';
          d.work_start_confirmed = false;
          renderStep1(main);
          return;
        }
      }
      markStatus(1, 'done');
      // Перерисовать чтобы обновить баннер «manual»
      renderStep1(main);
    });
    $('wz-desc').addEventListener('input', e => { d.desc = e.target.value; markStatus(1, 'done'); });
    bindIncludeBlock(1);

    markStatus(1, 'done');
  }

  // ═══ STEP 2: Заказчик (B1) — формат как на /customer-daily ═══
  function renderStep2(main) {
    const d = state.steps[2].data;
    if (!d.periods) d.periods = [];
    if (!d.from) d.from = null;
    if (!d.to) d.to = null;
    main.innerHTML = `
      <h2 class="wz-step-title"><span class="step-num">2</span>Анализ исходных данных (B1, заказчик)</h2>

      <div style="background: #fff3cd; border-left: 4px solid #f57f17; padding: 0.7rem 0.9rem; border-radius: 5px; margin-bottom: 1rem; font-size: 0.86rem; line-height: 1.5;">
        <b>📌 Зачем эта глава:</b> показать заказчику историю работы скважины
        <b>по его собственным суточным сводкам</b> ДО начала наших работ.
        Это доказывает, что скважина деградировала / была стабильна / улучшалась
        и подтверждает реальный эффект адаптации на фоне предыдущей динамики.
        <br><br>
        <b>Что добавлять в отчёт:</b> один или несколько периодов (например,
        «3 мес. до начала работ», «месяц перед работами», «лучший месяц в прошлом»)
        — каждый со своим описанием попадёт в PDF главу 2.
      </div>

      <div class="wz-step-hint">
        Источник: <code>well_daily</code> (суточные сводки УзКорГаз). Графики давлений
        и дебитов, учёт рабочего времени, помесячная агрегация, тренды, описания.
      </div>

      <div class="wz-section">
        <h3>Параметры периода</h3>

        <!-- ═══ Временная шкала с этапами (как на /customer-daily) ═══ -->
        <div class="tl2-builder">
          <div class="tl2-mode-row">
            Режим: <b id="tl2-mode-label">не выбран</b>
            <span class="tl2-period-display" id="tl2-period-display"></span>
          </div>
          <div class="tl2-zoom-row">
            <span style="font-size:0.78rem; color:#6b7280;">Масштаб:</span>
            <button type="button" class="tl2-zoom-btn" data-tl2-zoom="day"
                    title="Каждая дата отдельно (горизонтальный скролл)">Сутки</button>
            <button type="button" class="tl2-zoom-btn" data-tl2-zoom="week">Неделя</button>
            <button type="button" class="tl2-zoom-btn active" data-tl2-zoom="month">Месяц</button>
            <button type="button" class="tl2-zoom-btn" data-tl2-zoom="year">Год</button>
            <span style="margin-left:auto;">
              <button type="button" class="tl2-zoom-btn" id="tl2-clear-btn"
                      title="Снять выбор">✕ Сбросить</button>
            </span>
          </div>
          <div class="tl2-scroll" id="tl2-scroll">
            <div class="tl2-scale" id="tl2-scale"
                 title="Кликните по точке этапа = взять диапазон этапа. Клик по пустому месту: первый = «от», второй = «до».">
            </div>
          </div>
          <div class="tl2-help">
            <span><b>Точки сверху</b> — этапы из журнала статусов скважины (клик = взять весь диапазон этапа)</span>
            <span><b>Синяя полоса</b> — well_daily</span>
            <span><b>Зелёная полоса</b> — pressure_hourly (наши датчики)</span>
            <span><b>Клик по пустому месту</b>: первый = «от», повторный = «до»</span>
          </div>
        </div>

        <div class="wz-row">
          <div class="wz-field"><label>С</label><input type="date" id="wz2-from"></div>
          <div class="wz-field"><label>По</label><input type="date" id="wz2-to"></div>
        </div>
        <div style="display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.5rem;">
          <button id="wz2-analyze" class="wz-btn wz-btn-primary" style="margin-left: auto;">Проанализировать</button>
        </div>
        <div style="display:flex; align-items:center; gap:1rem; padding:0.5rem 0.7rem; background:#f5f7fa; border:1px solid #d8dee5; border-radius:5px; font-size:0.84rem; flex-wrap:wrap;">
          <label style="display:flex; align-items:center; gap:0.4rem; cursor:pointer;">
            <input type="checkbox" id="wz2-overlay-ours" style="margin:0;">
            <b>Наши данные</b>
            <span style="color:#666;">(почасовые P/ΔP/Q после масок)</span>
          </label>
          <label style="display:flex; align-items:center; gap:0.4rem; cursor:pointer;">
            <input type="checkbox" id="wz2-overlay-events" style="margin:0;">
            <b>События</b>
            <span style="color:#666;">(вбросы 💧 / продувки 🌀)</span>
          </label>
          <span id="wz2-overlay-status" style="color:#888; font-size:0.78rem; margin-left:auto;"></span>
        </div>
      </div>

      <!-- 4 графика 2x2 как на /customer-daily -->
      <div id="wz2-charts-block" style="display:none;">
        <div class="wz-section">
          <h3>Графики</h3>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.7rem;">
            <div id="wz2-ch-pres" style="height:300px;"></div>
            <div id="wz2-ch-static" style="height:300px;"></div>
            <div id="wz2-ch-rates" style="height:300px;"></div>
            <div id="wz2-ch-monthly" style="height:300px;"></div>
          </div>
          <div style="height:280px; margin-top:0.7rem;" id="wz2-ch-trends"></div>
        </div>
      </div>

      <!-- Описательная статистика (без квартилей) -->
      <div id="wz2-describe-block" style="display:none;">
        <div class="wz-section">
          <h3>Описательная статистика за период</h3>
          <table class="wz-table" id="wz2-describe-table"></table>
        </div>
      </div>

      <!-- Помесячная агрегация и тренды -->
      <div id="wz2-monthly-block" style="display:none;">
        <div class="wz-section">
          <h3>Помесячная агрегация и тренды</h3>
          <table class="wz-table" id="wz2-monthly-table"></table>
          <h3 style="margin-top:0.8rem;">Описание по месяцам</h3>
          <div id="wz2-monthly-desc"></div>
        </div>
      </div>

      <div class="wz-section">
        <h3>Периоды для отчёта</h3>
        <div id="wz2-periods-list"></div>
        <button id="wz2-add" class="wz-btn wz-btn-success" style="margin-top: 0.4rem;" disabled>
          + Добавить текущий период в отчёт
        </button>
      </div>

      ${includeBlock(2, 'Включить главу «Анализ исходных данных» в PDF')}
      ${navButtons(2)}
    `;
    bindIncludeBlock(2);

    // Восстанавливаем сохранённые поля периода (если были раньше)
    if (d.from) $('wz2-from').value = d.from;
    if (d.to) $('wz2-to').value = d.to;
    if (!$('wz2-from').value) {
      // Дефолт: попробуем умные пресеты на основе work_start_date или сегодняшней даты
      const ws = state.steps[1] && state.steps[1].data && state.steps[1].data.work_start;
      if (ws) {
        const wd = new Date(ws); const ago = new Date(wd.getTime() - 90 * 86400000);
        $('wz2-from').value = ago.toISOString().slice(0, 10);
        $('wz2-to').value = wd.toISOString().slice(0, 10);
      } else {
        const today = new Date(); const ago = new Date(Date.now() - 90 * 86400000);
        $('wz2-from').value = ago.toISOString().slice(0, 10);
        $('wz2-to').value = today.toISOString().slice(0, 10);
      }
      d.from = $('wz2-from').value;
      d.to = $('wz2-to').value;
    }

    $('wz2-from').addEventListener('change', e => { d.from = e.target.value; tl2SyncFromFields(); });
    $('wz2-to').addEventListener('change', e => { d.to = e.target.value; tl2SyncFromFields(); });
    $('wz2-analyze').addEventListener('click', wz2RunAnalysis);
    $('wz2-add').addEventListener('click', wz2AddCurrent);
    // Инициализируем конструктор периода (шкалу) для шага 2
    tl2Init();
    // Восстанавливаем состояние чекбоксов оверлея + обработчики.
    // По умолчанию — оба выключены; при первом включении попросит "Проанализировать".
    if (typeof d.overlayEvents === 'undefined') d.overlayEvents = !!d.overlayOurs;  // мигр.
    $('wz2-overlay-ours').checked = !!d.overlayOurs;
    $('wz2-overlay-events').checked = !!d.overlayEvents;
    $('wz2-overlay-ours').addEventListener('change', wz2OnOverlayToggle);
    $('wz2-overlay-events').addEventListener('change', wz2OnOverlayToggle);
    wz2RenderPeriodsList();

    // Восстанавливаем результат предыдущего анализа (если был)
    if (d.lastResult) {
      wz2CurrentAnalysis = d.lastResult;
      const our = (d.overlayOurs || d.overlayEvents) ? d.lastOurResult : null;
      wz2RenderPlotlyCharts(d.lastResult, our, {data: d.overlayOurs, events: d.overlayEvents});
      wz2RenderDescribe(d.lastResult.describe || []);
      wz2RenderMonthly(d.lastResult.monthly || [], d.lastResult.monthly_desc || []);
      $('wz2-add').disabled = false;
    }
  }

  // Переключение оверлеев. Каждый чекбокс независим, но оба используют один источник
  // (`/api/adaptation-report/our-segment`) — грузим один раз при включении любого.
  async function wz2OnOverlayToggle() {
    const d = state.steps[2].data;
    d.overlayOurs = $('wz2-overlay-ours').checked;
    d.overlayEvents = $('wz2-overlay-events').checked;
    if (!wz2CurrentAnalysis) return;  // Сначала надо проанализировать
    if (d.overlayOurs || d.overlayEvents) {
      await wz2LoadOurData();
    }
    const our = (d.overlayOurs || d.overlayEvents) ? d.lastOurResult : null;
    wz2RenderPlotlyCharts(wz2CurrentAnalysis, our, {data: d.overlayOurs, events: d.overlayEvents});
  }

  // Загружает наши данные (после масок) + события за выбранный период,
  // кеширует в state.steps[2].data.lastOurResult.
  async function wz2LoadOurData() {
    const d = state.steps[2].data;
    const from = d.from, to = d.to;
    if (!from || !to) return;
    // Кеш: не перезагружаем тот же период
    if (d.lastOurResult && d.lastOurResult._from === from && d.lastOurResult._to === to) return;
    const status = $('wz2-overlay-status');
    if (status) status.textContent = '⏳ Загружаю наши данные…';
    try {
      const r = await fetch(
        `/api/adaptation-report/our-segment?well_id=${state.well.id}` +
        `&date_from=${from}&date_to=${to}`
      );
      const data = await r.json();
      if (!data.ok) {
        if (status) status.textContent = '⚠ ' + (data.error || 'нет данных');
        d.lastOurResult = null;
        return;
      }
      data._from = from;
      data._to = to;
      d.lastOurResult = data;
      const cd = data.chart_data || [];
      const ev = data.events_for_chart || [];
      if (status) status.textContent = `✓ ${cd.length} час., событий: ${ev.length}`;
    } catch (e) {
      if (status) status.textContent = '⚠ ' + e.message;
      d.lastOurResult = null;
    }
  }

  // Smart preset: 3 / 1 мес. до даты начала работ
  window.wz2PresetBeforeWork = function(days) {
    const ws = state.steps[1] && state.steps[1].data && state.steps[1].data.work_start;
    const anchor = ws ? new Date(ws) : new Date();
    const from = new Date(anchor.getTime() - days * 86400000);
    const to = new Date(anchor.getTime() - 86400000);  // день перед work_start
    $('wz2-from').value = from.toISOString().slice(0, 10);
    $('wz2-to').value = to.toISOString().slice(0, 10);
    state.steps[2].data.from = $('wz2-from').value;
    state.steps[2].data.to = $('wz2-to').value;
    if (typeof tl2SyncFromFields === 'function') tl2SyncFromFields();
  };

  window.wz2Preset = function(days) {
    const today = new Date();
    const from = days === 0 ? new Date('2024-01-01') : new Date(Date.now() - days * 86400000);
    $('wz2-from').value = from.toISOString().slice(0, 10);
    $('wz2-to').value = today.toISOString().slice(0, 10);
    state.steps[2].data.from = $('wz2-from').value;
    state.steps[2].data.to = $('wz2-to').value;
    tl2SyncFromFields();
  };

  // ════════════════════════════════════════════════════════════════════
  //   Конструктор периода (шкала + якорь + до/после) для шага 2 wizard'a
  // ════════════════════════════════════════════════════════════════════
  let tl2State = {
    earliest: null, latest: null,
    anchor: null, anchorLabel: '',  // legacy (не используется в новом UI)
    from: null, to: null,
    zoom: 'month',                  // day | week | month | year
    data: null, suspendSync: false,
  };
  function _tl2Ymd(d) {
    if (!d || isNaN(d.getTime())) return '';
    return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'),
            String(d.getDate()).padStart(2,'0')].join('-');
  }
  function _tl2Parse(s) {
    if (!s) return null;
    const m = String(s).slice(0, 10).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return null;
    return new Date(+m[1], +m[2] - 1, +m[3]);
  }
  function _tl2DayDiff(a, b) {
    if (!a || !b) return 0;
    return Math.round((b - a) / 86400000);
  }
  function _tl2AddDays(d, n) {
    if (!d) return null;
    const out = new Date(d);
    out.setDate(out.getDate() + n);
    return out;
  }
  function _tl2Pct(d) {
    if (!d || !tl2State.earliest || !tl2State.latest) return 0;
    const total = (tl2State.latest - tl2State.earliest) || 86400000;
    return Math.max(0, Math.min(100, ((d - tl2State.earliest) / total) * 100));
  }

  async function tl2Init() {
    if (!state.well || !state.well.id) return;
    // Запрос timeline (тот же endpoint, что и в основной странице)
    try {
      const r = await fetch('/api/adaptation-report/timeline?well_id=' + state.well.id);
      if (!r.ok) { console.warn('tl2 fetch failed', r.status); return; }
      const d = await r.json();
      tl2State.data = d;
      // Левая граница: самая ранняя из доступных дат (с запасом 7 дней)
      const cands = [];
      if (d.customer_data?.first_date) cands.push(_tl2Parse(d.customer_data.first_date));
      if (d.our_data?.first_date)      cands.push(_tl2Parse(d.our_data.first_date));
      for (const s of (d.stages || [])) {
        if (s.dt_start) cands.push(_tl2Parse(s.dt_start));
      }
      const today = _tl2Parse(d.today) || new Date();
      tl2State.earliest = cands.length
        ? _tl2AddDays(cands.reduce((a,b) => a < b ? a : b), -7)
        : _tl2AddDays(today, -365);
      tl2State.latest = today;
      // Подцепить уже выставленные wz2-from / wz2-to
      tl2State.from = _tl2Parse($('wz2-from').value);
      tl2State.to   = _tl2Parse($('wz2-to').value);
      tl2BindHandlers();
      tl2Render();
      tl2UpdateMode();
    } catch (e) {
      console.warn('tl2Init', e);
    }
  }

  function _tl2ScaleWidth() {
    if (!tl2State.earliest || !tl2State.latest) return '100%';
    const days = _tl2DayDiff(tl2State.earliest, tl2State.latest) + 1;
    const pxPerDay = { day: 12, week: 4, month: 1.6, year: 0.5 }[tl2State.zoom || 'month'] || 1.6;
    const minW = 600;
    return Math.max(minW, Math.round(days * pxPerDay)) + 'px';
  }

  function tl2Render() {
    const scale = $('tl2-scale');
    if (!scale || !tl2State.earliest || !tl2State.latest) return;
    scale.style.width = _tl2ScaleWidth();
    const d = tl2State.data || {};
    const parts = [];

    // Бар данных заказчика
    if (d.customer_data?.first_date && d.customer_data?.last_date) {
      const a = _tl2Pct(_tl2Parse(d.customer_data.first_date));
      const b = _tl2Pct(_tl2Parse(d.customer_data.last_date));
      parts.push(
        `<div class="tl2-bar tl2-bar-customer" style="left:${a}%; width:${Math.max(b-a,0.3)}%;"
              title="well_daily: ${d.customer_data.first_date} — ${d.customer_data.last_date} (${d.customer_data.days_count} дн.)"></div>` +
        `<div class="tl2-bar-label" style="top:38px;">Заказчик</div>`
      );
    } else {
      parts.push(`<div class="tl2-bar-label" style="top:38px; color:#9ca3af;">Заказчик: нет данных</div>`);
    }
    // Бар наших датчиков
    if (d.our_data?.first_date && d.our_data?.last_date) {
      const a = _tl2Pct(_tl2Parse(d.our_data.first_date));
      const b = _tl2Pct(_tl2Parse(d.our_data.last_date));
      parts.push(
        `<div class="tl2-bar tl2-bar-our" style="left:${a}%; width:${Math.max(b-a,0.3)}%;"
              title="pressure_hourly: ${d.our_data.first_date} — ${d.our_data.last_date}"></div>` +
        `<div class="tl2-bar-label" style="top:60px;">Датчики</div>`
      );
    } else {
      parts.push(`<div class="tl2-bar-label" style="top:60px; color:#9ca3af;">Датчики: нет данных</div>`);
    }

    // Этапы — кликабельная точка + вертикальная линия + центрированный лейбл
    for (const s of (d.stages || [])) {
      if (!s.dt_start) continue;
      const xStart = _tl2Pct(_tl2Parse(s.dt_start));
      const xEnd   = s.dt_end ? _tl2Pct(_tl2Parse(s.dt_end)) : 100;
      const lblShort = (s.label || '').slice(0, 14);
      parts.push(
        `<div class="tl2-stage-line" style="left:${xStart}%; color:${s.color};"></div>`,
        `<div class="tl2-stage-dot" style="left:${xStart}%; color:${s.color};"
              data-stage-from="${_tl2Ymd(_tl2Parse(s.dt_start))}"
              data-stage-to="${s.dt_end ? _tl2Ymd(_tl2Parse(s.dt_end)) : _tl2Ymd(tl2State.latest)}"
              title="${s.label}: ${s.dt_start.slice(0,10)}${s.dt_end ? ' → ' + s.dt_end.slice(0,10) : ' → сейчас'}\nКлик — взять диапазон этапа">
         </div>`,
        `<div class="tl2-stage-label" style="left:${(xStart+xEnd)/2}%; color:${s.color};">${lblShort}</div>`
      );
      if (s.dt_end) {
        parts.push(`<div class="tl2-stage-line" style="left:${xEnd}%; color:${s.color}; opacity:0.25;"></div>`);
      }
    }

    // Range — выбранный период
    if (tl2State.from && tl2State.to) {
      const a = _tl2Pct(tl2State.from);
      const b = _tl2Pct(tl2State.to);
      const days = _tl2DayDiff(tl2State.from, tl2State.to) + 1;
      parts.push(
        `<div class="tl2-range" style="left:${a}%; width:${Math.max(b-a,0.3)}%;">
           <div class="tl2-range-label" style="left:6px;">${_tl2Ymd(tl2State.from)} → ${_tl2Ymd(tl2State.to)} (${days} дн.)</div>
         </div>`
      );
    } else if (tl2State.from) {
      const x = _tl2Pct(tl2State.from);
      parts.push(
        `<div class="tl2-anchor" style="left:${x}%;">
           <div class="tl2-anchor-line"></div>
         </div>`
      );
    }

    // Ось — метки в зависимости от зума
    const totalDays = _tl2DayDiff(tl2State.earliest, tl2State.latest) || 1;
    let step;
    if (tl2State.zoom === 'day') step = 7;
    else if (tl2State.zoom === 'week') step = 14;
    else if (tl2State.zoom === 'month') step = totalDays > 365 ? 60 : 30;
    else step = totalDays > 1500 ? 180 : 90;
    const axis = [];
    for (let cur = new Date(tl2State.earliest); cur <= tl2State.latest; cur = _tl2AddDays(cur, step)) {
      const x = _tl2Pct(cur);
      let lbl;
      if (tl2State.zoom === 'day' || tl2State.zoom === 'week') {
        lbl = String(cur.getDate()).padStart(2,'0') + '.' + String(cur.getMonth()+1).padStart(2,'0');
      } else {
        lbl = String(cur.getMonth()+1).padStart(2,'0') + '.' + String(cur.getFullYear()).slice(-2);
      }
      axis.push(`<div class="tl2-axis-tick" style="left:${x}%;">${lbl}</div>`);
    }
    parts.push(`<div class="tl2-axis">${axis.join('')}</div>`);

    scale.innerHTML = parts.join('');

    // Bind clicks on stage dots (rebind при каждом render — элементы новые)
    scale.querySelectorAll('.tl2-stage-dot').forEach(dot => {
      dot.addEventListener('click', ev => {
        ev.stopPropagation();
        const f = dot.dataset.stageFrom;
        const t = dot.dataset.stageTo;
        if (!f || !t) return;
        tl2State.from = _tl2Parse(f);
        tl2State.to   = _tl2Parse(t);
        tl2State.anchor = null;
        tl2WriteToFields();
        tl2Render();
        tl2UpdateMode();
      });
    });
  }

  function tl2WriteToFields() {
    if (tl2State.suspendSync) return;
    const from = tl2State.from ? _tl2Ymd(tl2State.from) : '';
    const to   = tl2State.to   ? _tl2Ymd(tl2State.to)   : '';
    if (from) $('wz2-from').value = from;
    if (to)   $('wz2-to').value   = to;
    if (state.steps[2]?.data) {
      if (from) state.steps[2].data.from = from;
      if (to)   state.steps[2].data.to   = to;
    }
  }
  function tl2SyncFromFields() {
    // Ручное редактирование wz2-from / wz2-to → отражаем на шкале
    tl2State.suspendSync = true;
    tl2State.from = _tl2Parse($('wz2-from').value);
    tl2State.to   = _tl2Parse($('wz2-to').value);
    tl2Render();
    tl2UpdateMode();
    tl2State.suspendSync = false;
  }

  function tl2UpdateMode() {
    const lbl = $('tl2-mode-label');
    const disp = $('tl2-period-display');
    if (!lbl) return;
    if (tl2State.from && tl2State.to) {
      const days = _tl2DayDiff(tl2State.from, tl2State.to) + 1;
      lbl.textContent = 'выбран диапазон';
      if (disp) disp.textContent = `${_tl2Ymd(tl2State.from)} → ${_tl2Ymd(tl2State.to)} · ${days} дн.`;
    } else if (tl2State.from) {
      lbl.textContent = 'задана левая граница, кликните по правой';
      if (disp) disp.textContent = `${_tl2Ymd(tl2State.from)} → …`;
    } else {
      lbl.textContent = 'не выбран';
      if (disp) disp.textContent = '';
    }
  }

  // Привязка обработчиков. Rebind при каждом renderStep2 — элементы
  // каждый раз новые после innerHTML.
  function tl2BindHandlers() {
    // Зум-кнопки
    document.querySelectorAll('.tl2-builder [data-tl2-zoom]').forEach(btn => {
      btn.addEventListener('click', () => {
        tl2State.zoom = btn.dataset.tl2Zoom;
        document.querySelectorAll('.tl2-builder [data-tl2-zoom]').forEach(b => {
          b.classList.toggle('active', b === btn);
        });
        tl2Render();
      });
    });
    // Сброс
    $('tl2-clear-btn')?.addEventListener('click', () => {
      tl2State.from = null; tl2State.to = null; tl2State.anchor = null;
      tl2WriteToFields();
      tl2Render();
      tl2UpdateMode();
    });
    // Клик по шкале: первый = «от», второй = «до», третий перезапускает
    $('tl2-scale')?.addEventListener('click', ev => {
      if (ev.target.closest('.tl2-stage-dot')) return;  // кружок этапа
      if (!tl2State.earliest || !tl2State.latest) return;
      const rect = ev.currentTarget.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
      const ms = tl2State.earliest.getTime() + pct * (tl2State.latest - tl2State.earliest);
      const d = new Date(ms); d.setHours(0, 0, 0, 0);
      if (tl2State.from && tl2State.to) {
        tl2State.from = d; tl2State.to = null;
      } else if (!tl2State.from) {
        tl2State.from = d;
      } else {
        if (d < tl2State.from) {
          tl2State.to = tl2State.from; tl2State.from = d;
        } else {
          tl2State.to = d;
        }
      }
      tl2WriteToFields();
      tl2Render();
      tl2UpdateMode();
    });
  }

  let wz2CurrentAnalysis = null;

  // Plotly common config
  const WZ2_PLOTLY_LAYOUT = {
    margin: {l: 50, r: 30, t: 40, b: 50},
    hovermode: 'x unified',
    font: {size: 11},
    legend: {orientation: 'h', y: -0.18},
  };
  const WZ2_PLOTLY_CONFIG = {displaylogo: false, responsive: true};

  async function wz2RunAnalysis() {
    const from = $('wz2-from').value, to = $('wz2-to').value;
    if (!from || !to) { alert('Укажите период'); return; }
    const wn = state.well.number;

    // Один вызов — даёт всё (chart, describe, monthly, monthly_desc)
    const r = await fetch(`/api/customer-daily/well/${encodeURIComponent(wn)}?date_from=${from}&date_to=${to}`);
    const d = await r.json();
    if (!d.ok || !d.rows) {
      $('wz2-charts-block').style.display = 'none';
      $('wz2-describe-block').style.display = 'none';
      $('wz2-monthly-block').style.display = 'none';
      alert('За период нет данных в well_daily.');
      $('wz2-add').disabled = true;
      return;
    }

    wz2CurrentAnalysis = d;
    // Кешируем результат в state — чтобы переживал переключение шагов
    const sd = state.steps[2].data;
    sd.lastResult = d;
    sd.from = from;
    sd.to = to;
    // Период сменился — старые наши данные больше не валидны
    if (sd.lastOurResult && (sd.lastOurResult._from !== from || sd.lastOurResult._to !== to)) {
      sd.lastOurResult = null;
    }
    if (sd.overlayOurs || sd.overlayEvents) await wz2LoadOurData();
    const ourForCharts = (sd.overlayOurs || sd.overlayEvents) ? sd.lastOurResult : null;
    wz2RenderPlotlyCharts(d, ourForCharts, {data: sd.overlayOurs, events: sd.overlayEvents});
    wz2RenderDescribe(d.describe || []);
    wz2RenderMonthly(d.monthly || [], d.monthly_desc || []);
    $('wz2-add').disabled = false;
    markStatus(2, 'done');
  }

  // Стили событий для оверлея на графиках заказчика
  const WZ2_EVENT_STYLES = {
    purge:   {line: 'rgba(156,39,176,0.55)', dash: 'dash',  width: 1.5, label: '🌀'},
    reagent: {line: 'rgba(46,125,50,0.6)',   dash: 'dot',   width: 1.2, label: '💧'},
    equip:   {line: 'rgba(2,136,209,0.5)',   dash: 'dot',   width: 1,   label: '🔧'},
    other:   {line: 'rgba(117,117,117,0.4)', dash: 'solid', width: 0.8, label: '·'},
  };
  // Вертикальные линии событий на всю высоту графика
  function wz2EventShapes(events) {
    return (events || []).map(ev => {
      const st = WZ2_EVENT_STYLES[ev.type] || WZ2_EVENT_STYLES.other;
      return {
        type:'line', xref:'x', yref:'paper',
        x0: ev.t, x1: ev.t, y0: 0, y1: 1,
        line:{color: st.line, width: st.width, dash: st.dash},
      };
    });
  }
  // Компактные эмодзи-метки сверху (без рамки/фона, чтобы не загромождать).
  // Если событий слишком много (>40) — метки не показываем, только линии.
  function wz2EventAnnotations(events) {
    const evs = events || [];
    if (evs.length > 40) return [];
    return evs.map(ev => {
      const st = WZ2_EVENT_STYLES[ev.type] || WZ2_EVENT_STYLES.other;
      return {
        x: ev.t, y: 1.0, xref:'x', yref:'paper',
        text: st.label, showarrow: false,
        font:{size: 11},
        yanchor: 'bottom',
      };
    });
  }

  // ─── 4 графика 2x2 + график трендов ───
  // ourData — опционально: наши почасовые данные с событиями.
  // flags — {data: bool, events: bool} управляет независимо отображением трейсов и линий событий.
  function wz2RenderPlotlyCharts(data, ourData, flags) {
    $('wz2-charts-block').style.display = '';
    const c = data.chart;
    const showData   = !!(flags && flags.data);
    const showEvents = !!(flags && flags.events);
    const ourCd = (showData && ourData && ourData.ok && ourData.chart_data) ? ourData.chart_data : null;
    const ourEv = (showEvents && ourData && ourData.ok) ? (ourData.events_for_chart || []) : [];
    const ourTs = ourCd ? ourCd.map(p => p.t) : null;
    const evShapes = wz2EventShapes(ourEv);
    const evAnnots = wz2EventAnnotations(ourEv);

    // 1) Давления (устье/затрубное/шлейф/статич) — наши P трубное/линейное накладываем как доп. трейсы
    const presTraces = [
      {x: c.dates, y: c.p_wellhead, name: 'Заказчик: устье',     mode:'lines+markers', marker:{size:4}, line:{width:1.4, color:'#1d4ed8'}},
      {x: c.dates, y: c.p_annular,  name: 'Заказчик: затрубное', mode:'lines+markers', marker:{size:4}, line:{width:1.4}},
      {x: c.dates, y: c.p_flowline, name: 'Заказчик: шлейф',     mode:'lines+markers', marker:{size:4}, line:{width:1.4, color:'#16a34a'}},
      {x: c.dates, y: c.p_static,   name: 'Заказчик: статич.',   mode:'lines+markers', marker:{size:4}, line:{width:1.4}},
    ];
    if (ourCd) {
      presTraces.push({x: ourTs, y: ourCd.map(p => p.p_tube), name:'Наши: P трубное (час)',
        mode:'lines', line:{color:'#FB8C00', width:1.2}, opacity:0.85});
      presTraces.push({x: ourTs, y: ourCd.map(p => p.p_line), name:'Наши: P линейное (час)',
        mode:'lines', line:{color:'#E53935', width:1.2}, opacity:0.85});
    }
    Plotly.newPlot('wz2-ch-pres', presTraces, {
      ...WZ2_PLOTLY_LAYOUT, title: 'Давления, кгс/см²',
      shapes: evShapes,
      annotations: evAnnots,
    }, WZ2_PLOTLY_CONFIG);

    // 2) ΔP — наша почасовая ΔP накладывается на ΔP заказчика
    const dpTraces = [
      {x: c.dates, y: c.dp, name: 'Заказчик: ΔP', mode:'lines+markers',
       marker:{size:5, color:'#dc2626'}, line:{color:'#dc2626', width:1.6}},
    ];
    if (ourCd) {
      dpTraces.push({x: ourTs, y: ourCd.map(p => p.dp), name:'Наши: ΔP (час)',
        mode:'lines', line:{color:'#7c3aed', width:1.2}, opacity:0.85});
    }
    Plotly.newPlot('wz2-ch-static', dpTraces, {
      ...WZ2_PLOTLY_LAYOUT, title: 'Перепад давления, кгс/см²',
      shapes: [
        {type:'line', xref:'paper', x0:0, x1:1, y0:0, y1:0,
         line:{color:'#94a3b8', width:1, dash:'dot'}},
        ...evShapes,
      ],
      annotations: evAnnots,
    }, WZ2_PLOTLY_CONFIG);

    // 3) Дебиты + простой — наш почасовой Q накладываем
    const ratesTraces = [
      {x: c.dates, y: c.q_gas_total,   name:'Заказчик: Q общий',
       mode:'lines+markers', marker:{size:5, color:'#1d4ed8'},
       line:{color:'#1d4ed8', width:1.5}, yaxis:'y'},
      {x: c.dates, y: c.q_gas_working, name:'Заказчик: Q рабочий',
       mode:'lines+markers', marker:{size:5, color:'#16a34a'},
       line:{color:'#16a34a', width:1.5}, yaxis:'y'},
      {x: c.dates, y: c.shutdown_min,  name:'Простой, мин',
       type:'bar', marker:{color:'rgba(220,38,38,0.35)'}, yaxis:'y2'},
    ];
    if (ourCd) {
      ratesTraces.push({x: ourTs, y: ourCd.map(p => p.q), name:'Наши: Q (час)',
        mode:'lines', line:{color:'#FB8C00', width:1.2}, opacity:0.85, yaxis:'y'});
    }
    Plotly.newPlot('wz2-ch-rates', ratesTraces, {
      ...WZ2_PLOTLY_LAYOUT, title: 'Дебиты и простой',
      yaxis: {title: 'Q, тыс.м³/сут'},
      yaxis2: {title: 'Простой, мин', overlaying: 'y', side: 'right',
               showgrid: false, rangemode: 'tozero'},
      barmode: 'overlay',
      shapes: evShapes,
      annotations: evAnnots,
    }, WZ2_PLOTLY_CONFIG);

    // 4) Помесячно: Q общий и рабочий
    if (data.monthly && data.monthly.length) {
      const m = data.monthly;
      const x = m.map(r => r.month_label);
      Plotly.newPlot('wz2-ch-monthly', [
        {x, y: m.map(r => r.mean_q_total),     name:'Q общ. ср.',  type:'bar', marker:{color:'#1d4ed8'}},
        {x, y: m.map(r => r.median_q_total),   name:'Q общ. мед.', type:'bar', marker:{color:'#93c5fd'}},
        {x, y: m.map(r => r.mean_q_working),   name:'Q раб. ср.',  type:'bar', marker:{color:'#16a34a'}},
        {x, y: m.map(r => r.median_q_working), name:'Q раб. мед.', type:'bar', marker:{color:'#86efac'}},
      ], {...WZ2_PLOTLY_LAYOUT, title:'Помесячно: Q общий и рабочий',
          barmode:'group', yaxis:{title:'Q, тыс.м³/сут'}}, WZ2_PLOTLY_CONFIG);

      // 5) Тренды по месяцам (отдельно)
      Plotly.newPlot('wz2-ch-trends', [
        {x, y: m.map(r => r.trend_q_total),
         name:'Тренд Q общ., /сут', type:'bar',
         marker:{color: m.map(r => (r.trend_q_total === null || r.trend_q_total === undefined)
                                    ? '#94a3b8'
                                    : (r.trend_q_total >= 0 ? '#16a34a' : '#dc2626'))}},
        {x, y: m.map(r => r.trend_dp),
         name:'Тренд ΔP, /сут', type:'scatter', mode:'lines+markers',
         line:{color:'#7c3aed', width:2}, marker:{size:8}, yaxis:'y2'},
      ], {...WZ2_PLOTLY_LAYOUT, title:'Тренды по месяцам (slope линейной регрессии за день)',
          yaxis: {title: 'Тренд Q, /сут', zeroline:true,
                  zerolinecolor:'#94a3b8'},
          yaxis2: {title: 'Тренд ΔP, /сут', overlaying: 'y', side: 'right',
                   showgrid: false, zeroline: true, zerolinecolor:'#94a3b8'}},
        WZ2_PLOTLY_CONFIG);
    }
  }

  // ─── Описательная статистика (без квартилей q25/q75) ───
  function wz2RenderDescribe(rows) {
    if (!rows || !rows.length) {
      $('wz2-describe-block').style.display = 'none';
      return;
    }
    $('wz2-describe-block').style.display = '';
    const tbl = $('wz2-describe-table');

      '<th>Параметр</th><th>N</th><th>Среднее</th><th>СКО</th>' +
      '<th>Мин</th><th>Медиана</th><th>Макс</th>' +
      '</tr></thead><tbody></tbody>';

    for (const r of rows) {

        `<td>${fmt(r.min)}</td><td>${fmt(r.median)}</td><td>${fmt(r.max)}</td>`;
      tb.appendChild(tr);
    }

  // ─── Помесячная агрегация и тренды + описания по месяцам ───

  function wz2AddCurrent() {
    if (!wz2CurrentAnalysis || !wz2CurrentAnalysis.days_count) return;
    const desc = prompt('Описание этого периода для отчёта:', '') || '';
    state.steps[2].data.periods.push({
      period_from: $('wz2-from').value,
      period_to: $('wz2-to').value,
      description: desc,
      snapshot: {
        days_count: wz2CurrentAnalysis.days_count,
        q_total_avg: wz2CurrentAnalysis.q_total_avg,
        shutdown_min_total: wz2CurrentAnalysis.shutdown_min_total,
      },
    });
    state.steps[2].include = true;
    wz2RenderPeriodsList();
    renderStepper();
  }

  function wz2RenderPeriodsList() {
    const box = $('wz2-periods-list');
    const periods = state.steps[2].data.periods || [];
    if (!periods.length) {
      box.innerHTML = '<div class="wz-placeholder" style="padding: 1rem;">Периоды не добавлены.</div>';
      return;
    }
    let html = '<ol style="font-size:0.85rem; padding-left:1.4rem;">';
    periods.forEach((p, i) => {
      html += `<li style="margin-bottom:0.4rem;">
        <b>${p.period_from} → ${p.period_to}</b>
        (${p.snapshot.days_count} дн., Q ср. ${fmt(p.snapshot.q_total_avg)}, простой ${fmt(p.snapshot.shutdown_min_total, 0)} мин)
        <button class="wz-btn wz-btn-outline" style="padding:0.1rem 0.4rem; font-size:0.75rem; margin-left:0.4rem;" onclick="wz2RemovePeriod(${i})">×</button>
        ${p.description ? `<div style="font-style:italic; color:#666;">${p.description}</div>` : ''}
      </li>`;

    box.innerHTML = html;

  window.wz2RemovePeriod = function(i) {
    state.steps[2].data.periods.splice(i, 1);
    wz2RenderPeriodsList();
  };

  function fmt(v, d=2) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    return Number(v).toFixed(d);
  }
  // ═══ STEP 3: Наблюдение (B2) — полный анализ ═══
  function renderStep3(main) {
    const d = state.steps[3].data;
    if (!d.source) d.source = 'auto';

    const m = state.metadata || {};
    const ss = m.stages_status;
    const se = m.stages_events;

    // 3 источника (без избыточного 4-го)
    const sources = [
      {
        key: 'status',
        label: 'Из журнала статусов (well_status)',
        from: ss && ss.obs_from ? ss.obs_from.slice(0, 16) : null,

      {

                      opacity: ${disabled ? 0.5 : 1}; font-size: 0.86rem;">
          <input type="radio" name="wz3-src" value="${s.key}" ${isActive ? 'checked' : ''}
                 ${disabled ? 'disabled' : ''} style="margin: 0;">
          <span style="flex: 1;">${s.label}</span>

    }
    srcHtml += '</div>';

    main.innerHTML = `
      <h2 class="wz-step-title"><span class="step-num">3</span>Этап наблюдения (B2, наши данные)</h2>

      <div style="background: #fff3cd; border-left: 4px solid #f57f17; padding: 0.7rem 0.9rem; border-radius: 5px; margin-bottom: 1rem; font-size: 0.86rem; line-height: 1.5;">
        <b>📌 Зачем эта глава:</b> на наших датчиках (минутная/часовая дискретность,
        точнее данных заказчика) фиксируем <b>базовые параметры</b> до начала работ.
        Можно <b>менять длительность периода</b> и видеть как меняются базовые значения
        (Q, ΔP, КИВ). Когда нашли «правильное» окно — нажмите «Зафиксировать как baseline B2».
        <br><br>
        <b>Окончание наблюдения = начало адаптации</b> — автоматически прокидывается в шаг 5.
      </div>

      <div class="wz-section">
        <h3>Источник дат этапа</h3>
        ${srcHtml}
        <div class="wz-row">
          <div class="wz-field">
            <label>Начало</label>
            <input type="datetime-local" id="wz3-from" value="${d.from || ''}"
                   ${d.source !== 'manual' ? 'readonly style="background:#f5f5f5;"' : ''}>
          </div>
          <div class="wz-field">
            <label>Окончание <span style="color:#1976D2; font-size:0.78rem;">(= начало адаптации)</span></label>
            <input type="datetime-local" id="wz3-to" value="${d.to || ''}"
                   ${d.source !== 'manual' ? 'readonly style="background:#f5f5f5;"' : ''}>

        </div>
        <div id="wz3-duration-info" style="font-size:0.82rem; color:#666; margin-bottom:0.4rem;"></div>
        <button id="wz3-analyze" class="wz-btn wz-btn-primary">Проанализировать</button>

      <!-- Полные графики -->

        <div class="wz-section">
          <h3>Графики этапа</h3>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.7rem;">
            <div id="wz3-ch-pres" style="height:280px;"></div>
            <div id="wz3-ch-dp" style="height:280px;"></div>
            <div id="wz3-ch-flow" style="height:280px;"></div>
            <div id="wz3-ch-down" style="height:280px;"></div>
          </div>
        </div>
      </div>

      <!-- Сохранение baseline B2 -->
      <div id="wz3-save-baseline" style="display:none;"></div>

      <div class="wz-section">
        <h3>Описание этапа (для PDF)</h3>
        <textarea id="wz3-desc" rows="3" placeholder="Что наблюдали, особенности скважины, замечания...">${d.description || ''}</textarea>

      ${includeBlock(3, 'Включить раздел «Этап наблюдения» в PDF')}

    bindIncludeBlock(3);

    // Применяем источник по умолчанию
    if (!d.from && !d.to) {
      const auto = sources.find(s => s.from && s.to);
      if (auto) {

        d.from = auto.from;

        $('wz3-from').value = auto.from;
        $('wz3-to').value = auto.to;
      }
    }

    // Восстановить кешированный анализ
    if (d.lastResult) {
      wz3RenderAnalysis(d.lastResult, d.previousBaseline);
    }
    wz3UpdateDuration();

    document.querySelectorAll('input[name="wz3-src"]').forEach(el => {
      el.addEventListener('change', () => {
        d.source = el.value;
        const src = sources.find(s => s.key === el.value);
        if (src) {

          if (src.to)   { d.to   = src.to;   $('wz3-to').value   = src.to; }

        $('wz3-to').style.background = ro ? '#f5f5f5' : '';

        wz3MarkStale();

        wz3DebouncedAnalyze();
      });
    });

    $('wz3-from').addEventListener('change', e => {
      d.from = e.target.value;

      d.to = e.target.value;

      wz3MarkStale();

    ['wz3-from','wz3-to'].forEach(id => {

  // Помечаем кэш устаревшим (визуально)
  function wz3MarkStale() {
    const card = $('wz3-baseline-card');
    if (!card || !card.innerHTML) return;
    // Полупрозрачный + баннер
    card.style.opacity = '0.5';
    let banner = $('wz3-stale-banner');
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'wz3-stale-banner';
      banner.style.cssText = 'background:#fff3cd; border-left:3px solid #f57f17; padding:0.5rem 0.7rem; border-radius:4px; font-size:0.85rem; color:#5d4037; margin:0.6rem 0;';
      banner.innerHTML = '⏳ Результаты устарели — пересчёт...';
      card.parentNode.insertBefore(banner, card);
    }
  }

  function wz3ClearStale() {
    const card = $('wz3-baseline-card');
    if (card) card.style.opacity = '';
    const banner = $('wz3-stale-banner');
    if (banner) banner.remove();
  }

  // Дебаунс для авто-пересчёта
  let _wz3AnalyzeTimer = null;
  function wz3DebouncedAnalyze(delay = 500) {
    clearTimeout(_wz3AnalyzeTimer);
    _wz3AnalyzeTimer = setTimeout(() => {
      const f = $('wz3-from') && $('wz3-from').value;
      const t = $('wz3-to') && $('wz3-to').value;
      if (!f || !t) return;
      if (new Date(t).getTime() <= new Date(f).getTime()) return;
      wz3RunAnalysis();
    }, delay);
  }

  function wz3UpdateDuration() {
    const f = $('wz3-from') && $('wz3-from').value;
    const t = $('wz3-to') && $('wz3-to').value;
    if (!f || !t) { if ($('wz3-duration-info')) $('wz3-duration-info').textContent = ''; return; }
    const ms = new Date(t).getTime() - new Date(f).getTime();
    if (ms <= 0) {
      $('wz3-duration-info').innerHTML = '<span style="color:#c62828;">Окончание раньше начала.</span>';
      return;
    }
    const hours = Math.round(ms / 3600000 * 10) / 10;
    const days = Math.floor(hours / 24);
    const remH = Math.round(hours - days * 24);
    const dur = days > 0 ? (remH > 0 ? `${days} сут. ${remH} ч` : `${days} сут.`) : `${hours} ч`;
    $('wz3-duration-info').innerHTML = `<b>Длительность периода:</b> ${dur}`;
  }

  // Автосинхронизация: end of observation → start of adaptation
  function wz3SyncToStep5() {
    const obsEnd = state.steps[3].data.to;
    if (!obsEnd) return;
    state.steps[5].data.from = obsEnd;
    // Если есть длительность — пересчитать конец
    const days = state.steps[5].data.duration_days || 10;
    if (state.steps[5].data.duration_source !== 'status' && state.steps[5].data.duration_source !== 'custom_to') {
      const dt = new Date(obsEnd); dt.setDate(dt.getDate() + days);
      const now = new Date(); const capped = dt > now ? now : dt;
      const pad = (n) => String(n).padStart(2, '0');
      state.steps[5].data.to = `${capped.getFullYear()}-${pad(capped.getMonth()+1)}-${pad(capped.getDate())}T${pad(capped.getHours())}:${pad(capped.getMinutes())}`;
    }
    renderTiles();
  }

  async function wz3RunAnalysis() {
    const f = $('wz3-from').value, t = $('wz3-to').value;
    if (!f || !t) { alert('Укажите даты'); return; }
    if (new Date(t).getTime() <= new Date(f).getTime()) {
      alert('Окончание раньше или равно началу.'); return;
    }
    const d = state.steps[3].data;
    const previousBaseline = d.lastResult ? d.lastResult.observation : null;
    d.from = f; d.to = t;

    $('wz3-baseline-card').innerHTML = '<div class="wz-loading"><div class="wz-spinner"></div>Анализ...</div>';
    $('wz3-trends').innerHTML = '';
    $('wz3-charts-block').style.display = 'none';
    $('wz3-save-baseline').style.display = 'none';

    // dummy adapt-период: 1 час после окончания наблюдения (для прохождения валидации)
    const adaptFrom = t;
    const adaptToDt = new Date(t); adaptToDt.setHours(adaptToDt.getHours() + 1);
    const pad = (n) => String(n).padStart(2, '0');
    const adaptTo = `${adaptToDt.getFullYear()}-${pad(adaptToDt.getMonth()+1)}-${pad(adaptToDt.getDate())}T${pad(adaptToDt.getHours())}:${pad(adaptToDt.getMinutes())}`;

    const body = {
      well_id: state.well.id,
      obs_from: f, obs_to: t,
      adapt_from: adaptFrom, adapt_to: adaptTo,
      with_charts: false, with_reagent: false,
      optimal_mode: 'off',
    };
    try {
      const r = await fetch('/api/adaptation-report/compute', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
      });
      const data = await r.json();
      if (!data.ok) {
        $('wz3-baseline-card').innerHTML = `<div class="wz-error">${data.error || 'Ошибка'}</div>`;
        return;
      }
      // Кешируем
      d.lastResult = data;
      d.previousBaseline = previousBaseline;
      d.stats = data.observation;
      wz3ClearStale();
      wz3RenderAnalysis(data, previousBaseline);
      markStatus(3, 'done');
    } catch (e) {
      $('wz3-baseline-card').innerHTML = `<div class="wz-error">${e.message}</div>`;
    }
  }

  function wz3RenderAnalysis(data, previousBaseline) {
    const obs = data.observation || {};
    wz3RenderBaselineCard(obs, previousBaseline);
    wz3RenderTrends(obs);
    wz3RenderCharts(obs);
    wz3RenderSaveBaseline();
  }

  // ────────────────────────────────────────────────────────────────
  // Единая функция расчёта B2-метрик (используется и для показа, и для save)
  // ────────────────────────────────────────────────────────────────
  function wz3ComputeBaselineStats(obs) {
    const d = state.steps[3].data;
    const ann = d.annotations || [];
    const cd = obs.chart_data || [];
    const isExcluded = (t) => {
      const ts = new Date(t).getTime();
      return ann.some(a => {
        const a1 = new Date(a.from).getTime(), a2 = new Date(a.to).getTime();
        return ts >= a1 && ts <= a2;
      });
    };
    const filtered = ann.length ? cd.filter(c => !isExcluded(c.t)) : cd;

    const arr = key => filtered.map(c => c[key]).filter(v => v !== null && !isNaN(v));
    const mean = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : null;
    const median = a => {
      if (!a.length) return null;
      const s = [...a].sort((x,y)=>x-y); const n = s.length;
      return n % 2 ? s[(n-1)/2] : (s[n/2-1] + s[n/2]) / 2;
    };

    const qArr = arr('q'), dpArr = arr('dp'),
          ptArr = arr('p_tube'), plArr = arr('p_line');
    const qWorking = qArr.filter(v => v > 0);

    // Рабочие/простой по отфильтрованным точкам
    const workingPoints = filtered.filter(c =>
      c.p_tube !== null && c.p_line !== null && c.dp !== null && c.dp > 0.1
    ).length;
    const downtimePoints = filtered.length - workingPoints;
    // Плюс часы исключённые аннотациями kind='downtime' и 'purge'
    const annDowntimeHours = ann
      .filter(a => a.kind === 'downtime' || a.kind === 'purge')
      .reduce((s, a) => s + (new Date(a.to).getTime() - new Date(a.from).getTime()) / 3600000, 0);
    const downtimeTotalHours = downtimePoints + Math.round(annDowntimeHours);

    const evPurges = (obs.events_for_chart || []).filter(e => e.type === 'purge').length;
    const manualPurges = ann.filter(a => a.kind === 'purge').length;
    const totalPurges = evPurges + manualPurges;

    const evReagents = (obs.events_for_chart || []).filter(e => e.type === 'reagent').length;

    const totalHours = filtered.length;
    const utilization = totalHours > 0 ? (workingPoints / totalHours * 100) : null;

    return {
      // Дебит
      q_total_mean: mean(qArr),
      q_total_median: median(qArr),
      q_working_mean: mean(qWorking),
      q_working_median: median(qWorking),
      // Давления
      p_tube_mean: mean(ptArr),
      p_tube_median: median(ptArr),
      p_line_mean: mean(plArr),
      p_line_median: median(plArr),
      dp_mean: mean(dpArr),
      dp_median: median(dpArr),
      // Время
      hours_total: totalHours,
      working_hours: workingPoints,
      downtime_hours: downtimeTotalHours,
      utilization_pct: utilization,
      duration_days: Math.max(1, Math.round(totalHours / 24)),
      duration_label: obs.duration_label,
      // События
      purge_count_events: evPurges,
      purge_count_manual: manualPurges,
      purge_count_total: totalPurges,
      reagent_count: evReagents,
      // Метаданные
      excluded_hours: cd.length - filtered.length,
      excluded_pct: cd.length ? (cd.length - filtered.length) / cd.length * 100 : 0,
    };
  }
