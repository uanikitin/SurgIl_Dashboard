      <div class="wz-step-hint">
        <b>Начало адаптации = окончание наблюдения</b> (из шага 3).
        Длительность задаётся одним из источников ниже.
        От этого зависит весь анализ — статистика, тренды, эффективность реагентов и оптимум R★.
      </div>

      <div class="wz-section">
        <h3>Источник длительности</h3>
        ${srcHtml}
        ${d.duration_source === 'custom_days' ? `
          <div class="wz-field">
            <label>Число суток</label>
            <input type="number" id="wz5-days-input" min="1" max="60" value="${d.duration_days}"
                   style="width: 6rem;">
          </div>
        ` : ''}
        <div class="wz-row">
          <div class="wz-field">
            <label>Начало <span style="color:#1976D2; font-size:0.78rem;">(= конец наблюдения)</span></label>
            <input type="datetime-local" id="wz5-from" value="${d.from || ''}" readonly style="background:#f5f5f5;">
          </div>
          <div class="wz-field">
            <label>Окончание</label>
            <input type="datetime-local" id="wz5-to" value="${d.to || ''}"
                   ${d.duration_source !== 'custom_to' ? 'readonly style="background:#f5f5f5;"' : ''}>
          </div>
        </div>
      </div>

      <div class="wz-section">
        <h3>Оптимум R★</h3>
        <div class="wz-field">
          <label>Ширина окна (сут.)</label>
          <input type="number" id="wz5-opt-days" min="1" max="10" value="${d.optimal_window_days}" style="width: 5rem;">
        </div>
        <button id="wz5-analyze" class="wz-btn wz-btn-primary">Проанализировать адаптацию + R★</button>
      </div>

      <div id="wz5-result"></div>

      <div class="wz-section">
        <h3>Описание этапа (для PDF)</h3>
        <textarea id="wz5-desc" rows="3" placeholder="Какие реагенты применяли, что наблюдали...">${d.description || ''}</textarea>
      </div>

      ${includeBlock(5, 'Включить раздел «Этап адаптации» в PDF')}
      ${navButtons(5)}
    `;
    bindIncludeBlock(5);

    // Применяем источник
    wz5ApplySource();

    document.querySelectorAll('input[name="wz5-src"]').forEach(el => {
      el.addEventListener('change', () => {
        d.duration_source = el.value;
        wz5ApplySource();
        renderStep5(main);
      });
    });
    if ($('wz5-days-input')) {
      $('wz5-days-input').addEventListener('input', e => {
        d.duration_days = parseInt(e.target.value) || 10;
        wz5ApplySource();
      });
    }
    $('wz5-to').addEventListener('change', e => {
      if (d.duration_source === 'custom_to') d.to = e.target.value;
    });
    $('wz5-analyze').addEventListener('click', wz5RunAnalysis);
    $('wz5-desc').addEventListener('input', e => { d.description = e.target.value; });
  }

  function wz5ApplySource() {
    const d = state.steps[5].data;
    const m = state.metadata || {};
    const ss = m.stages_status;
    const f = d.from || (state.steps[3].data.to);
    if (!f) return;
    if (!d.from) d.from = f;
    const fInp = $('wz5-from'); if (fInp) fInp.value = d.from;

    const pad = (n) => String(n).padStart(2, '0');
    const fmtDt2 = (dt) => `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;

    let to = null;
    if (d.duration_source === 'status' && ss && ss.adapt_to) {
      to = ss.adapt_to.slice(0, 16);
    } else if (d.duration_source === 'days_10') {
      const dt = new Date(d.from); dt.setDate(dt.getDate() + 10);
      const now = new Date(); to = fmtDt2(dt > now ? now : dt);
    } else if (d.duration_source === 'custom_days') {
      const days = d.duration_days || 10;
      const dt = new Date(d.from); dt.setDate(dt.getDate() + days);
      const now = new Date(); to = fmtDt2(dt > now ? now : dt);
    } else if (d.duration_source === 'custom_to') {
      to = d.to || null;  // сохранить ручной ввод
    }
    if (to !== null) {
      d.to = to;
      const tInp = $('wz5-to'); if (tInp) tInp.value = to;
    }
    renderTiles();
  }

  async function wz5RunAnalysis() {
    const f = $('wz5-from').value, t = $('wz5-to').value;
    if (!f || !t) { alert('Укажите даты'); return; }
    const optDays = parseInt($('wz5-opt-days').value) || 3;
    const d = state.steps[5].data;
    d.from = f; d.to = t; d.optimal_window_days = optDays;

    const obsFrom = state.steps[3].data.from || f;
    const obsTo = state.steps[3].data.to || f;

    const box = $('wz5-result');
    box.innerHTML = '<div class="wz-loading"><div class="wz-spinner"></div>Анализ адаптации + поиск R★...</div>';

    const body = {
      well_id: state.well.id,
      obs_from: obsFrom, obs_to: obsTo,
      adapt_from: f, adapt_to: t,
      with_charts: false, with_reagent: true,
      optimal_mode: 'auto',
      optimal_window_days: optDays,
    };
    const r = await fetch('/api/adaptation-report/compute', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (!data.ok) {
      box.innerHTML = `<div class="wz-error">${data.error || 'Ошибка'}</div>`;
      return;
    }
    const a = data.adaptation || {};
    const o = data.optimal_regime;
    const re = data.reagent_effectiveness || {};
    const cands = data.optimal_candidates || [];

    let html = `
      <div class="wz-preview-card">
        <h4 style="margin: 0 0 0.4rem; color: #555;">Этап адаптации (весь период)</h4>
        <span class="wz-preview-stat">Длит: <b>${a.duration_label || a.duration_days + ' сут.'}</b></span>
        <span class="wz-preview-stat">Q мед: <b>${fmt(a.flow_median)}</b></span>
        <span class="wz-preview-stat">Q ср: <b>${fmt(a.flow_avg)}</b></span>
        <span class="wz-preview-stat">Q max: <b>${fmt(a.q_max)}</b></span>
        <span class="wz-preview-stat">ΔP мед: <b>${fmt(a.dp_median)}</b></span>
        <span class="wz-preview-stat">Вбросов: <b>${a.reagent_count}</b></span>
        <span class="wz-preview-stat">Продувок: <b>${a.purge_count}</b></span>
      </div>
    `;
    if (o) {
      html += `
        <div class="wz-preview-card" style="background: #e8f5e9;">
          <h4 style="margin: 0 0 0.4rem; color: #2e7d32;">⭐ Оптимальный режим R★</h4>
          <span class="wz-preview-stat">${o.date_from} → ${o.date_to}</span>
          <span class="wz-preview-stat">Длит: <b>${o.duration_label || o.duration_days + ' сут.'}</b></span>
          <span class="wz-preview-stat">Q мед: <b style="color:#2e7d32;">${fmt(o.flow_median)}</b></span>
          <span class="wz-preview-stat">Q ср: <b>${fmt(o.flow_avg)}</b></span>
          ${o.score !== undefined ? `<span class="wz-preview-stat">Score: <b>${fmt(o.score, 2)}</b></span>` : ''}
        </div>
      `;
    }
    if (cands.length > 0) {
      html += `<div style="font-size: 0.82rem; color: #666; margin-top: 0.4rem;">Top-3 кандидата:`;
      cands.forEach((c, i) => {
        html += ` <span style="display: inline-block; padding: 0.1rem 0.4rem; background: #f0f7ff; border-radius: 3px; margin: 0.1rem;">#${i+1} Q=${fmt(c.q_median)}</span>`;
      });
      html += `</div>`;
    }
    if (re && re.best_reagent) {
      html += `<div class="wz-info">
        🧪 Лучший реагент: <b>${re.best_reagent.reagent}</b>, уровень ${re.best_reagent.level} (${re.best_reagent.level_name})
      </div>`;
    }
    box.innerHTML = html;
    state.steps[5].data.stats = a;
    state.steps[5].data.optimal = o;
    state.steps[5].data.reagent = re;
    markStatus(5, 'done');
  }
  // ═══ STEP 6: Сводное сравнение ═══
  function renderStep6(main) {
    main.innerHTML = `
      <h2 class="wz-step-title"><span class="step-num">6</span>Сводное сравнение B1 / B2 / R / R★</h2>
      <div class="wz-step-hint">
        Главная таблица отчёта — все четыре среза рядом, дельты и %.
        Заполняется автоматически из шагов 2, 3 и 5.
      </div>

      <div id="wz6-table"></div>

      <div class="wz-section">
        <h3>Описание / выводы (для PDF)</h3>
        <textarea id="wz6-desc" rows="4" placeholder="Можно оставить пусто — попадут только автовыводы.">${state.steps[6].data.description || ''}</textarea>
      </div>

      ${includeBlock(6, 'Включить раздел «Сводное сравнение» в PDF')}
      ${navButtons(6)}
    `;
    bindIncludeBlock(6);
    $('wz6-desc').addEventListener('input', e => { state.steps[6].data.description = e.target.value; });
    wz6BuildTable();
  }

  function wz6BuildTable() {
    const obs = state.steps[3].data.stats;
    const adapt = state.steps[5].data.stats;
    const opt = state.steps[5].data.optimal;
    const b1Periods = state.steps[2].data.periods || [];
    const b1 = b1Periods.length > 0 ? b1Periods[b1Periods.length - 1].snapshot : null;

    if (!obs && !adapt && !b1) {
      $('wz6-table').innerHTML = '<div class="wz-warn">Сначала пройдите шаги 2, 3 и 5 (нет данных для сравнения).</div>';
      markStatus(6, 'warn');
      return;
    }

    // Метрики для сравнения (имена ключей одинаковые в обоих источниках где возможно)
    const rows = [
      ['Q мед, тыс.м³/сут',
        b1 && b1.q_total_avg !== undefined ? '—' : null,  // B1 даёт avg чаще, не median
        obs?.flow_median, adapt?.flow_median, opt?.flow_median],
      ['Q ср, тыс.м³/сут', b1?.q_total_avg, obs?.flow_avg, adapt?.flow_avg, opt?.flow_avg],
      ['Q max, тыс.м³/сут', null, obs?.q_max, adapt?.q_max, opt?.q_max],
      ['ΔP мед, кгс/см²', null, obs?.dp_median, adapt?.dp_median, opt?.dp_median],
      ['Длит., сут.', b1?.days_count, obs?.duration_days, adapt?.duration_days, opt?.duration_days],
    ];

    const cls = (cur, base) => {
      if (cur === null || base === null || cur === undefined || base === undefined) return '';
      return cur > base ? 'delta-pos' : (cur < base ? 'delta-neg' : '');
    };
    const dlt = (cur, base) => {
      if (cur === null || base === null || cur === undefined || base === undefined) return '—';
      const d = cur - base;
      return (d >= 0 ? '+' : '') + d.toFixed(2);
    };
    const dpct = (cur, base) => {
      if (cur === null || base === null || cur === undefined || base === undefined || base === 0) return '—';
      const p = (cur - base) / Math.abs(base) * 100;
      return (p >= 0 ? '+' : '') + p.toFixed(1) + '%';
    };

    let html = `<table class="wz-table"><thead><tr>
      <th>Показатель</th>
      <th>B1<br><span style="font-weight:400; color:#888;">заказчик</span></th>
      <th>B2<br><span style="font-weight:400; color:#888;">наблюдение</span></th>
      <th>R<br><span style="font-weight:400; color:#888;">адаптация</span></th>
      <th style="background:#e8f5e9;">R★<br><span style="font-weight:400; color:#888;">оптимум</span></th>
      <th style="background:#fffbf0;">Δ R★ vs B2</th>
      <th style="background:#fffbf0;">Δ R★ vs B1</th>
    </tr></thead><tbody>`;

    for (const r of rows) {
      const [label, b1v, b2v, rv, rsv] = r;
      html += `<tr>
        <td>${label}</td>
        <td>${b1v !== null && b1v !== undefined ? fmt(b1v) : '—'}</td>
        <td>${b2v !== null && b2v !== undefined ? fmt(b2v) : '—'}</td>
        <td>${rv !== null && rv !== undefined ? fmt(rv) : '—'}</td>
        <td style="background:#f1f8e9;">${rsv !== null && rsv !== undefined ? fmt(rsv) : '—'}</td>
        <td class="${cls(rsv, b2v)}" style="background:#fffbf0;">${dlt(rsv, b2v)} (${dpct(rsv, b2v)})</td>
        <td class="${cls(rsv, b1v)}" style="background:#fffbf0;">${dlt(rsv, b1v)} (${dpct(rsv, b1v)})</td>
      </tr>`;
    }
    html += '</tbody></table>';

    // Автовыводы
    let conclusions = '<h4 style="margin:0.8rem 0 0.3rem;">Автовыводы</h4><ul style="font-size:0.85rem; padding-left:1.4rem;">';
    if (opt && obs && opt.flow_median && obs.flow_median) {
      const d = opt.flow_median - obs.flow_median;
      const p = d / obs.flow_median * 100;
      const verb = p > 5 ? 'вырос' : p < -5 ? 'снизился' : 'стабилен';
      conclusions += `<li>Дебит на оптимальном режиме R★ <b>${verb}</b> на ${d.toFixed(2)} тыс.м³/сут (${p >= 0 ? '+' : ''}${p.toFixed(1)}%) относительно нашего наблюдения (B2).</li>`;
    }
    if (opt && b1 && opt.flow_median && b1.q_total_avg) {
      const d = opt.flow_median - b1.q_total_avg;
      const p = d / b1.q_total_avg * 100;
      conclusions += `<li>В сравнении с данными заказчика (B1): ${d >= 0 ? '+' : ''}${d.toFixed(2)} тыс.м³/сут (${p >= 0 ? '+' : ''}${p.toFixed(1)}%).</li>`;
      // Ожидаемая доп. добыча
      if (d > 0) {
        const month = d * 30;
        conclusions += `<li>При сохранении режима R★ ожидаемая доп. добыча: <b>+${month.toFixed(1)} тыс.м³</b> за 30 сут.</li>`;
      }
    }
    conclusions += '</ul>';

    $('wz6-table').innerHTML = html + conclusions;
    markStatus(6, 'done');
  }

  // ═══ STEP 7: Сборка ═══
  function renderStep7(main) {
    const included = [];
    Object.entries(state.steps).forEach(([n, s]) => {
      if (n === '7') return;
      if (s.include) included.push({n, title: s.title});
    });

    let listHtml;
    if (included.length === 0) {
      listHtml = `<div class="wz-warn">Не выбрано ни одной главы. Включите минимум одну.</div>`;
    } else {
      listHtml = '<ol style="font-size: 0.88rem; padding-left: 1.4rem;">';
      for (const it of included) listHtml += `<li>${it.title}</li>`;
      listHtml += '</ol>';
    }

    main.innerHTML = `
      <h2 class="wz-step-title"><span class="step-num">7</span>Сборка отчёта</h2>
      <div class="wz-step-hint">Проверка состава и финальная генерация PDF.</div>

      <div class="wz-section">
        <h3>В отчёт попадут разделы:</h3>
        ${listHtml}
      </div>

      <div class="wz-section">
        <button id="wz-generate" class="wz-btn wz-btn-success" ${included.length === 0 ? 'disabled' : ''}>
          📄 Сформировать PDF
        </button>
      </div>

      <div class="wz-section">
        <h3>Предпросмотр</h3>
        <div id="wz-pdf-preview">
          <div class="wz-placeholder">Нажмите «Сформировать PDF».</div>
        </div>
      </div>

      ${navButtons(7)}
    `;
    const btn = $('wz-generate');
    if (btn) btn.addEventListener('click', generatePdf);
  }

  // ═══ Generate PDF ═══
  async function generatePdf() {
    const box = $('wz-pdf-preview');
    box.innerHTML = '<div class="wz-loading"><div class="wz-spinner"></div>Генерация PDF...</div>';

    // Если шаги 3 или 5 не пройдены — пробуем автодетект
    let obsFrom = state.steps[3].data.from;
    let obsTo = state.steps[3].data.to;
    let adaptFrom = state.steps[5].data.from;
    let adaptTo = state.steps[5].data.to;

    if (!obsFrom || !obsTo || !adaptFrom || !adaptTo) {
      try {
        const stageData = await fetch(`/api/adaptation-report/stage-data?well_id=${state.well.id}`)
          .then(r => r.json());
        if (stageData.ok) {
          if (!obsFrom) obsFrom = stageData.observation.date_from;
          if (!obsTo) obsTo = stageData.observation.date_to;
          if (!adaptFrom) adaptFrom = stageData.adaptation.date_from;
          if (!adaptTo) adaptTo = stageData.adaptation.date_to;
        }
      } catch (e) {}
    }
    if (!obsFrom || !adaptFrom) {
      box.innerHTML = '<div class="wz-error">Не удалось определить даты этапов. Заполните шаги 3 и 5.</div>';
      return;
    }

    const optD = parseInt(state.steps[5].data.optimal_window_days) || 3;
    const customerPeriods = (state.steps[2].data.periods || []).map(p => ({
      period_from: p.period_from, period_to: p.period_to,
      description: p.description || '',
    }));

    const body = {
      well_id: state.well.id,
      obs_from: obsFrom, obs_to: obsTo,
      adapt_from: adaptFrom, adapt_to: adaptTo,
      obs_description: state.steps[3].data.description || null,
      adapt_description: state.steps[5].data.description || null,
      with_charts: true, with_reagent: state.steps[5].include,
      optimal_mode: 'auto', optimal_window_days: optD,
      include_customer_chapter: state.steps[2].include && customerPeriods.length > 0,
      customer_periods: customerPeriods,
    };

    try {
      const r = await fetch('/api/adaptation-report/preview-pdf', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        box.innerHTML = `<div class="wz-error">Ошибка: ${err.detail || r.status}</div>`;
        return;
      }
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      box.innerHTML = `<iframe class="wz-pdf-iframe" src="${url}"></iframe>`;
    } catch (e) {
      box.innerHTML = `<div class="wz-error">${e.message}</div>`;
    }
  }

  function markStatus(n, status) {
    state.steps[n].status = status;
    renderStepper();
    renderTiles();
  }

  // ═══ Wells loader ═══
  async function loadWells() {
    const r = await fetch('/api/adaptation-report/wells');
    const d = await r.json();
    const sel = $('wz-well-select');
    for (const w of d.wells) {
      const opt = document.createElement('option');
      opt.value = w.id;
      opt.textContent = `Скв ${w.number}` + (w.name && w.name !== `Скв ${w.number}` ? ` — ${w.name}` : '');
      opt.dataset.well = JSON.stringify(w);
      sel.appendChild(opt);
    }
  }

  $('wz-well-select').addEventListener('change', async (e) => {
    const id = parseInt(e.target.value);
    if (!id) {
      state.well = null;
      state.metadata = null;
      $('wz-main').innerHTML = '<div class="wz-placeholder">Выберите скважину чтобы начать.</div>';
      $('wz-overview').innerHTML = '';
      $('wz-tiles').innerHTML = '';
      return;
    }
    // reset state
    Object.values(state.steps).forEach(s => { s.status = 'todo'; s.data = {}; });
    // НЕ ставим work_start_source принудительно — пусть renderStep1 авто-определит по метаданным
    state.steps[1].data = { work_start: '', desc: '' };
    state.steps[2].data = { periods: [] };
    state.steps[5].data = { window_days: 10, optimal_window_days: 3 };

    await loadWellMetadata(id);
    await wz3LoadExistingBaseline();  // подтягиваем утверждённый B2 если есть
    await wz4LoadExistingB1();        // подтягиваем утверждённый B1 (заказчика) если есть
    renderOverview();
    renderTiles();
    renderStepper();
    renderStep(state.currentStep);
  });

  async function loadWellMetadata(wellId) {
    const r = await fetch(`/api/adaptation-report/stage-data?well_id=${wellId}`);
    const d = await r.json();
    state.well = d.well || { id: wellId, number: '?', name: '', horizon: '', choke_mm: null };
    state.well.id = wellId;
    state.metadata = {
      stages_status: d.stages_from_status,    // {obs_from, obs_to, adapt_from, adapt_to}
      stages_events: d.stages_from_events,    // {obs_from, obs_to, adapt_from, adapt_to, rationale}
      observation: d.observation,             // если расчёт прошёл
      adaptation: d.adaptation,
      source_used: d.source_used,
    };
  }

  function fmtDt(s) {
    if (!s) return '—';
    return s.slice(0, 16).replace('T', ' ');
  }
  function fmtD(s) {
    if (!s) return '—';
    return s.slice(0, 10);
  }

  function renderOverview() {
    const box = $('wz-overview');
    if (!state.well) { box.innerHTML = ''; return; }
    const w = state.well;
    const m = state.metadata || {};
    const ss = m.stages_status;
    const se = m.stages_events;

    let cards = '';

    // Скважина
    cards += `<div class="wz-card">
      <div class="wz-card-title">Скважина</div>
      <div class="wz-card-body">
        <b>№${w.number}</b> · ${w.name || '—'}<br>
        Горизонт: ${w.horizon || '—'} · Штуцер: <b>${w.choke_mm || '—'}</b> мм
      </div>
    </div>`;

    // Этап Наблюдения (из well_status)
    if (ss && ss.obs_from) {
      cards += `<div class="wz-card">
        <div class="wz-card-title">Этап «Наблюдение» (БД)</div>
        <div class="wz-card-body">
          ${fmtDt(ss.obs_from)}<br>→ ${fmtDt(ss.obs_to)}
        </div>
      </div>`;
    } else {
      cards += `<div class="wz-card wz-card-warn">
        <div class="wz-card-title">Этап «Наблюдение» (БД)</div>
        <div class="wz-card-body">не задан в журнале статусов</div>
      </div>`;
    }

    // Этап Адаптации (из well_status)
    if (ss && ss.adapt_from) {
      cards += `<div class="wz-card">
        <div class="wz-card-title">Этап «Адаптация» (БД)</div>
        <div class="wz-card-body">
          ${fmtDt(ss.adapt_from)}<br>→ ${fmtDt(ss.adapt_to)}
        </div>
      </div>`;
    } else {
      cards += `<div class="wz-card wz-card-warn">
        <div class="wz-card-title">Этап «Адаптация» (БД)</div>
        <div class="wz-card-body">не задан в журнале статусов</div>
      </div>`;
    }

    // Ключевые события
    if (se) {
      const equipDate = se.obs_from;        // первое equip-событие
      const reagentDate = se.adapt_from;    // первый вброс реагента
      cards += `<div class="wz-card">
        <div class="wz-card-title">Ключевые события</div>
        <div class="wz-card-body">
          🔧 Уст. оборудования: <b>${fmtDt(equipDate)}</b><br>
          💧 Первый вброс: <b>${fmtDt(reagentDate)}</b>
        </div>
      </div>`;
    }

    box.innerHTML = cards;
  }

  function renderTiles() {
    const box = $('wz-tiles');
    if (!state.well) { box.innerHTML = ''; return; }
    const titles = [
      [1, 'Скважина'],
      [2, 'B1: Заказчик'],
      [3, 'B2: Наблюдение'],
      [4, 'Кросс-валидация'],
      [5, 'R/R★ Адаптация'],
      [6, 'Сравнение'],
      [7, 'Сборка'],
    ];
    let html = '';
    for (const [n, name] of titles) {
      const s = state.steps[n];
      const cls = ['wz-tile'];
      if (s.status === 'done') cls.push('done');
      cls.push(s.include ? 'included' : 'excluded');
      let status = '';
      if (n === 2) {
        const cnt = (s.data.periods || []).length;
        status = cnt > 0 ? `${cnt} период(а/ов)` : 'не задан';
      } else if (n === 3) {
        status = s.data.from ? `${fmtDt(s.data.from)}` : 'не задан';
      } else if (n === 5) {
        status = s.data.from ? `${fmtDt(s.data.from)}` : 'не задан';
      } else {
        status = s.status === 'done' ? '✓ готово' : 'не настроено';
      }
      html += `
        <div class="${cls.join(' ')}" onclick="goToStep(${n})">
          <div class="tile-num">Шаг ${n}</div>
          <div class="tile-name">${name}</div>
          <div class="tile-status">${status}</div>
        </div>
      `;
    }
    box.innerHTML = html;
  }

  // ═══ Init ═══
  renderStepper();
  loadWells();

  // URL pre-select
  const urlWell = new URL(location.href).searchParams.get('well_id');
  if (urlWell) {
    setTimeout(() => {
      const sel = $('wz-well-select');
      sel.value = urlWell;
      sel.dispatchEvent(new Event('change'));
    }, 200);
  }
</script>
{% endblock %}
